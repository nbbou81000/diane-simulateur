<body class="theme-tahoe">

<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const h=React.createElement;const F=React.Fragment;

/* ═══════════════ WAVEFORMS — Philips IntelliVue MP5 ═══════════════ */
function ecgW(phase,H){var m=H*.5,base=m+Math.sin(phase*Math.PI*2)*H*.008;
if(phase<.06)return base;
if(phase<.10){var t=(phase-.06)/.04;return base-H*.04*Math.sin(t*Math.PI)}
if(phase<.13)return base;
if(phase<.145){var t=(phase-.13)/.015;return base+H*.03*Math.sin(t*Math.PI)}
if(phase<.17){var t=(phase-.145)/.025;return base-H*.45*Math.sin(t*Math.PI)}
if(phase<.195){var t=(phase-.17)/.025;return base+H*.12*Math.sin(t*Math.PI)}
if(phase<.24)return base;
if(phase<.34){var t=(phase-.24)/.10;return base-H*.09*Math.sin(t*Math.PI)}
return base}
function plethW(phase,H){var m=H*.55;
if(phase<.04)return m;
if(phase<.14){var t=(phase-.04)/.10;return m-H*.40*Math.sin(t*Math.PI*.5)*(1-t*.1)}
if(phase<.20){var t=(phase-.14)/.06;return m-H*.40+H*.22*t}
if(phase<.26){var t=(phase-.20)/.06;return m-H*.18+H*.04*t+Math.sin(t*Math.PI*2)*H*.04}
if(phase<.55){var t=(phase-.26)/.29;return m-H*.12*Math.exp(-t*3)}
return m}
function capnoW(phase,H){var base=H*.82,plat=H*.18;
if(phase<.08)return base;
if(phase<.14){var t=(phase-.08)/.06;var s=t*t*(3-2*t);return base+(plat-base)*s}
if(phase<.48){var t=(phase-.14)/.34;return plat+t*H*.03}
if(phase<.54){var t=(phase-.48)/.06;var s=t*t*(3-2*t);return(plat+H*.03)+(base-plat-H*.03)*s}
return base}
function fvW(f,H){return H*.5+Math.sin(f*.47)*H*.25*Math.sin(f*.13)+Math.sin(f*1.1)*H*.15+Math.sin(f*.7+2)*H*.1}
function WC({fc,spo2,etco2,isAcr,rhythm,w,ht,mode,isDead}){
  var ref=useRef(null);var buf=useRef({e:[],p:[],c:[],f:0});
  useEffect(function(){var cv=ref.current;if(!cv)return;var ctx=cv.getContext('2d');
    var dpr=window.devicePixelRatio||1;cv.width=w*dpr;cv.height=ht*dpr;cv.style.width=w+'px';cv.style.height=ht+'px';ctx.scale(dpr,dpr);var raf;
    function drawTrace(ctx,pts,color,yOff,scH,w,ht){if(!pts.length)return;
      /* Phosphor persistence — glow multicouche */
      ctx.globalAlpha=.07;ctx.strokeStyle=color;ctx.lineWidth=8;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();
      for(var i=0;i<pts.length;i++){var x=i*2,y=(pts[i]/ht)*scH+yOff;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();
      ctx.globalAlpha=.14;ctx.lineWidth=5;ctx.beginPath();
      for(var i=0;i<pts.length;i++){var x=i*2,y=(pts[i]/ht)*scH+yOff;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();
      ctx.globalAlpha=.30;ctx.lineWidth=3;ctx.beginPath();
      for(var i=0;i<pts.length;i++){var x=i*2,y=(pts[i]/ht)*scH+yOff;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();
      ctx.globalAlpha=1;ctx.lineWidth=1.4;ctx.beginPath();
      for(var i=0;i<pts.length;i++){var x=i*2,y=(pts[i]/ht)*scH+yOff;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.stroke();
      /* Dot lumineux sur la tête de tracé */
      if(pts.length>1){var lx=(pts.length-1)*2,ly=(pts[pts.length-1]/ht)*scH+yOff;
        ctx.globalAlpha=0.5;ctx.fillStyle=color;ctx.beginPath();ctx.arc(lx,ly,3.5,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(lx,ly,1.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}}
    function draw(){var b=buf.current;b.f++;var mx=Math.floor(w/2);
      var per=fc>0?60/Math.max(fc,20):999;var time=(b.f*.033)%per;var phase=time/per;
      if(isDead){b.e.push(ht/2);b.p.push(ht*.55);b.c.push(ht*.82);}
      else if(isAcr||fc===0){var isFV=rhythm==="FV"||rhythm==="TV";
        b.e.push(isFV?fvW(b.f,ht):ht/2+(Math.random()-.5)*1.5);b.p.push(ht/2+(Math.random()-.5)*.8);b.c.push(ht*.82+(Math.random()-.5)*.8)}
      else{b.e.push(ecgW(phase,ht));b.p.push(plethW(phase,ht));b.c.push(etco2>5?capnoW(phase,ht):ht*.82)}
      if(b.e.length>mx){b.e.shift();b.p.shift();b.c.shift()}
      /* Fond oscillo + grille phosphore */
      ctx.fillStyle='#010203';ctx.fillRect(0,0,w,ht);
      ctx.strokeStyle='rgba(30,45,55,.22)';ctx.lineWidth=.4;
      for(var i=0;i<w;i+=20){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,ht);ctx.stroke()}
      for(var i=0;i<ht;i+=20){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(w,i);ctx.stroke()}
      if(mode==='all'){var sh=ht/3;
        ctx.save();ctx.beginPath();ctx.rect(0,0,w,sh);ctx.clip();ctx.strokeStyle=isDead?'#444':'#00ff41';drawTrace(ctx,b.e,isDead?'#444':'#00ff41',0,sh,w,ht);ctx.restore();
        ctx.save();ctx.beginPath();ctx.rect(0,sh,w,sh);ctx.clip();ctx.strokeStyle=isDead?'#444':'#00d4ff';drawTrace(ctx,b.p,isDead?'#444':'#00d4ff',sh,sh,w,ht);ctx.restore();
        ctx.save();ctx.beginPath();ctx.rect(0,sh*2,w,sh);ctx.clip();ctx.strokeStyle=isDead?'#444':'#f0f0a0';drawTrace(ctx,b.c,isDead?'#444':'#f0f0a0',sh*2,sh,w,ht);ctx.restore();
        /* Séparateurs de voie */
        ctx.strokeStyle='rgba(60,80,90,.4)';ctx.lineWidth=.6;ctx.globalAlpha=1;
        ctx.beginPath();ctx.moveTo(0,sh);ctx.lineTo(w,sh);ctx.stroke();ctx.beginPath();ctx.moveTo(0,sh*2);ctx.lineTo(w,sh*2);ctx.stroke();
        /* Labels voies */
        ctx.font='bold 7px Arial';ctx.fillStyle=isDead?'#555':'rgba(0,255,65,.7)';ctx.fillText('II',3,9);
        ctx.fillStyle=isDead?'#555':'rgba(0,212,255,.7)';ctx.fillText('Pleth',3,sh+9);
        ctx.fillStyle=isDead?'#555':'rgba(240,240,160,.7)';ctx.fillText('CO₂',3,sh*2+9)}
      else{var pts=mode==='ecg'?b.e:mode==='pleth'?b.p:b.c;
        var col=isDead?'#555':mode==='ecg'?(isAcr?'#ff3030':'#00ff41'):mode==='pleth'?'#00d4ff':'#f0f0a0';
        ctx.strokeStyle=col;drawTrace(ctx,pts,col,0,ht,w,ht);
        ctx.font='bold 10px Arial';ctx.fillStyle=isDead?'#555':col.replace('1)','0.75)');ctx.fillText(mode==='ecg'?'II':mode==='pleth'?'Pleth':'CO₂ mmHg',3,13)}
      raf=requestAnimationFrame(draw)}
    raf=requestAnimationFrame(draw);return function(){cancelAnimationFrame(raf)}},[fc,spo2,etco2,isAcr,rhythm,w,ht,mode,isDead]);
  return h('canvas',{ref:ref,style:{display:'block',width:w,height:ht,borderRadius:3,background:'#010203'}})
}

/* ═══════════════ RESPONSIVE WAVEFORM WRAPPER ═══════════════ */
function WaveContainer({fc,spo2,etco2,isAcr,rhythm,isDead,ht,mode}){
  const ref=useRef(null);const[w,sW]=useState(300);
  useEffect(()=>{if(!ref.current)return;
    const ro=new ResizeObserver(e=>{const bw=Math.floor(e[0].contentRect.width);if(bw>0)sW(bw)});
    ro.observe(ref.current);sW(Math.floor(ref.current.getBoundingClientRect().width)||300);
    return()=>ro.disconnect();},[]);
  return h('div',{ref,style:{width:'100%',height:ht,overflow:'hidden'}},
    w>0&&h(WC,{fc,spo2,etco2,isAcr,rhythm,isDead,w:Math.max(60,w),ht,mode}))
}
function TimelineResponsive({history,ht}){
  const ref=useRef(null);const[w,sW]=useState(300);
  useEffect(()=>{if(!ref.current)return;
    const ro=new ResizeObserver(e=>{const bw=Math.floor(e[0].contentRect.width);if(bw>0)sW(bw)});
    ro.observe(ref.current);sW(Math.floor(ref.current.getBoundingClientRect().width)||300);
    return()=>ro.disconnect();},[]);
  return h('div',{ref,style:{width:'100%'}},
    w>0&&h(Timeline,{history,w:Math.max(60,w),ht}))
}

/* ═══════════════════════════════════════════════════════════════════════
   AUDIO — Moteur IEC 60601-1-8  (révision complète)
   ─────────────────────────────────────────────────────────────────────
   Synthèse ADDITIVE : chaque son est construit par superposition d'une
   fondamentale et de partiels harmoniques (sinus purs) pour obtenir le
   timbre riche et métallique des moniteurs Philips IntelliVue / Dräger
   Infinity / GE Datex-Ohmeda.

   Enveloppe ADSR appliquée sur un nœud de mixage commun à tous les
   oscillateurs d'une même note → zéro clic, zéro artefact.

   Architecture : oscillateurs one-shot planifiés, aucun oscillateur
   persistant. Les alarmes répétées tournent via setInterval.
   ═══════════════════════════════════════════════════════════════════════ */

var _audioCtx   = null;
var _masterGain = null;

/* ── Initialisation ────────────────────────────────────────────────────── */
function _initAudioCtx(){
  if(!_audioCtx) _audioCtx = new(window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state === 'suspended') _audioCtx.resume();
}

/* ── Synthèse additive + ADSR ──────────────────────────────────────────
   @param {number}   freq     Fréquence fondamentale (Hz)
   @param {number}   dur      Durée de tenu (s) — hors release
   @param {number}   vol      Volume de crête sur le gain maître (0–1)
   @param {number}   time     audioCtx.currentTime + offset de départ
   @param {Array}    partials [{ratio:number, amp:number}, ...]
                              ratio = multiple de freq, amp = amplitude relative
   @param {Object}   adsr     {a, d, sl, r} en secondes / fraction
                              a  = attack   (défaut 5 ms)
                              d  = decay    (défaut 30 ms)
                              sl = sustain level fraction  (défaut 0.78)
                              r  = release  (défaut 20 ms)
   ────────────────────────────────────────────────────────────────────── */
function _synthNote(freq, dur, vol, time, partials, adsr){
  if(!_audioCtx || !_masterGain) return;
  var ctx = _audioCtx;
  var A   = (adsr && adsr.a  !== undefined) ? adsr.a  : 0.005;
  var D   = (adsr && adsr.d  !== undefined) ? adsr.d  : 0.030;
  var SL  = (adsr && adsr.sl !== undefined) ? adsr.sl : 0.78;
  var R   = (adsr && adsr.r  !== undefined) ? adsr.r  : 0.020;
  if(!partials || !partials.length)
    partials = [{ratio:1,amp:1},{ratio:2,amp:0.45},{ratio:3,amp:0.25},{ratio:5,amp:0.10}];

  /* Nœud de mixage de la note — enveloppe ADSR dessus */
  var mix = ctx.createGain();
  mix.gain.setValueAtTime(0.0001, time);
  mix.gain.linearRampToValueAtTime(vol,      time + A);           // Attaque
  mix.gain.linearRampToValueAtTime(vol * SL, time + A + D);      // Déclin → Sustain
  mix.gain.setValueAtTime(vol * SL,          time + dur - R);    // Tenu
  mix.gain.exponentialRampToValueAtTime(0.0001, time + dur + R); // Release
  mix.connect(_masterGain);

  /* Un oscillateur sinus par partiel harmonique */
  partials.forEach(function(p){
    var osc = ctx.createOscillator();
    var gp  = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq * p.ratio;
    gp.gain.value = p.amp;
    osc.connect(gp);
    gp.connect(mix);
    osc.start(time);
    osc.stop(time + dur + R + 0.015);
  });
}

/* ── Pulse SpO2 — Philips IntelliVue MP5 / GE Carescape ───────────────
   Rendu sonore naturel et chaleureux, proche des vrais moniteurs :

   Architecture :
   • Fondamentale quasi-pure (sine) à ~80-95% de l'énergie totale
   • Infime 2e harmonique pour la « présence » sans métallisation
   • Enveloppe douce : attaque 4 ms, decay exponentiel lisse vers 90 ms
   • Filtre passe-bas (Biquad LPF 1 200 Hz, Q 0.55) en sortie
     → élimine les artefacts haute-fréquence et donne le timbre
       « rond » caractéristique des transducteurs de moniteur
   • Double couche de gain : env → lpf → masterGain
     (imite la chaîne ampli → HP de cabinet plastique du moniteur)

   Pitch dynamique selon SpO2 — courbe calibrée Philips IntelliVue :
     ≥ 100 : 880 Hz  |  97–99 : 820–864 Hz  |  90–96 : 640–814 Hz
     80–89 : 500–632 Hz  |  < 80 : 420 Hz (alerte grave)
   ────────────────────────────────────────────────────────────────────── */

function _playPulse(spo2Val){
  if(!_audioCtx || !_masterGain) return;
  var ctx = _audioCtx;
  var t = ctx.currentTime;

  /* ── Pitch mapping courbe Masimo/Philips ── */
  var f;
  if      (spo2Val >= 100) f = 880;
  else if (spo2Val >=  97) f = 820  + (spo2Val -  97) * 14.7;
  else if (spo2Val >=  90) f = 640  + (spo2Val -  90) / 7.0 * 174.0;
  else if (spo2Val >=  80) f = 500  + (spo2Val -  80) / 10.0 * 132.0;
  else                     f = 420;

  /* ── Filtre passe-bas — timbre chaleureux (chaîne haut-parleur) ── */
  var lpf = ctx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = 1200;
  lpf.Q.value = 0.55;
  lpf.connect(_masterGain);

  /* ── Enveloppe douce — attaque souple, decay naturel ── */
  var vol = 0.085;
  var env = ctx.createGain();
  env.gain.setValueAtTime(0.0001, t);
  env.gain.linearRampToValueAtTime(vol,       t + 0.004);   // attaque souple 4ms
  env.gain.setValueAtTime(vol,                t + 0.010);   // plateau court 6ms
  env.gain.exponentialRampToValueAtTime(vol * 0.45, t + 0.040); // decay doux
  env.gain.exponentialRampToValueAtTime(vol * 0.12, t + 0.075); // queue naturelle
  env.gain.exponentialRampToValueAtTime(0.0001,     t + 0.100); // extinction
  env.connect(lpf);

  /* ── Fondamentale — sine pure (corps chaud du son) ── */
  var osc1 = ctx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.value = f;
  var g1 = ctx.createGain();
  g1.gain.value = 1.0;
  osc1.connect(g1);
  g1.connect(env);
  osc1.start(t);
  osc1.stop(t + 0.115);

  /* ── 2e harmonique minimale — présence sans métallisation ── */
  var osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = f * 2;
  var g2 = ctx.createGain();
  g2.gain.value = 0.055;   // réduit vs v8 (0.12 → 0.055) : bien moins strident
  osc2.connect(g2);
  g2.connect(env);
  osc2.start(t);
  osc2.stop(t + 0.115);

  /* ── Sous-tonique douce — chaleur analogique (légère) ── */
  var osc3 = ctx.createOscillator();
  osc3.type = 'sine';
  osc3.frequency.value = f * 0.5;
  var g3 = ctx.createGain();
  g3.gain.value = 0.018;   // infime mais ajoute rondeur
  osc3.connect(g3);
  g3.connect(env);
  osc3.start(t);
  osc3.stop(t + 0.115);
}

/* ── Alarme ROUGE — IEC 60601-1-8 Priorité Haute ──────────────────────
   Séquence : ●●●  (pause 240 ms)  ●●  sur tonique C6 = 1046,5 Hz.
   Timbre strident mais propre : fondamentale forte + 2e harmonique saillante.
   Intervalle de répétition : 3,5 s (norme ≤ 4 s pour priorité haute).
   ────────────────────────────────────────────────────────────────────── */
var _RED_FREQ  = 1046.50;   // C6
var _RED_PARTS = [
  {ratio:1, amp:1.00},
  {ratio:2, amp:0.60},
  {ratio:3, amp:0.22},
  {ratio:4, amp:0.08}
];
var _RED_ADSR  = {a:0.004, d:0.016, sl:0.84, r:0.014};
var _RED_DUR   = 0.108;     // durée d'un bip (s)
var _RED_GAP   = 0.078;     // inter-bip silence (s)
var _RED_PAUSE = 0.240;     // pause entre groupe 3 et groupe 2 (s)
var _RED_VOL   = 0.048;

function _playRedAlarm(){
  if(!_audioCtx || !_masterGain) return;
  var t  = _audioCtx.currentTime;
  var d  = _RED_DUR, g = _RED_GAP, pa = _RED_PAUSE;
  /* Groupe 1 : 3 bips à la même hauteur */
  _synthNote(_RED_FREQ, d, _RED_VOL, t,            _RED_PARTS, _RED_ADSR);
  _synthNote(_RED_FREQ, d, _RED_VOL, t+d+g,        _RED_PARTS, _RED_ADSR);
  _synthNote(_RED_FREQ, d, _RED_VOL, t+2*(d+g),    _RED_PARTS, _RED_ADSR);
  /* Pause puis Groupe 2 : 2 bips */
  var g2 = t + 3*(d+g) + pa;
  _synthNote(_RED_FREQ, d, _RED_VOL, g2,     _RED_PARTS, _RED_ADSR);
  _synthNote(_RED_FREQ, d, _RED_VOL, g2+d+g, _RED_PARTS, _RED_ADSR);
}

/* ── Alarme JAUNE — IEC 60601-1-8 Priorité Moyenne ────────────────────
   Séquence mélodique ASCENDANTE en arpège de Do Majeur (C5–E5–G5).
   Timbre doux, harmoniques limitées, volume modéré.
   Intervalle de répétition : 5,2 s.
   ────────────────────────────────────────────────────────────────────── */
var _YEL_FREQS = [523.25, 659.25, 783.99];   // C5, E5, G5
var _YEL_PARTS = [
  {ratio:1, amp:1.00},
  {ratio:2, amp:0.32},
  {ratio:3, amp:0.14}
];
var _YEL_ADSR  = {a:0.008, d:0.038, sl:0.72, r:0.028};
var _YEL_DUR   = 0.128;
var _YEL_GAP   = 0.088;
var _YEL_VOL   = 0.034;

function _playYelAlarm(){
  if(!_audioCtx || !_masterGain) return;
  var t = _audioCtx.currentTime;
  _YEL_FREQS.forEach(function(f, i){
    _synthNote(f, _YEL_DUR, _YEL_VOL, t + i*(_YEL_DUR+_YEL_GAP), _YEL_PARTS, _YEL_ADSR);
  });
}

/* ── Façade `au` — interface publique (inchangée) ──────────────────────── */
const au = {
  muted  : false,
  sil    : 0,
  vol    : 0.3,
  _ivs   : {},        // { [patientId]: { iv, lv } }
  allowed: new Set(),

  init(){
    _initAudioCtx();
    if(!_masterGain && _audioCtx){
      _masterGain = _audioCtx.createGain();
      _masterGain.gain.value = this.vol;
      _masterGain.connect(_audioCtx.destination);
    }
  },

  sv(v){
    this.vol = v;
    if(_masterGain) _masterGain.gain.value = this.muted ? 0 : v;
  },

  tm(){
    this.muted = !this.muted;
    if(_masterGain) _masterGain.gain.value = this.muted ? 0 : this.vol;
    return this.muted;
  },

  s2(){
    this.sil = Date.now() + 120000;
    if(_masterGain) _masterGain.gain.value = 0;
  },

  cs(){
    if(this.sil && Date.now() > this.sil){
      this.sil = 0;
      if(_masterGain && !this.muted) _masterGain.gain.value = this.vol;
    }
  },

  isSil(){ return this.sil > 0 && Date.now() < this.sil; },

  setA(ids){
    this.allowed = new Set(ids);
    Object.keys(this._ivs).forEach(k=>{
      if(!this.allowed.has(+k)) this._si(+k);
    });
  },

  _si(id){
    var k = String(id);
    if(this._ivs[k]){ clearInterval(this._ivs[k].iv); delete this._ivs[k]; }
  },

  _k(k){ this._si(parseInt(k.replace(/\D/g,''))); },

  stopAll(){
    Object.keys(this._ivs).forEach(k => clearInterval(this._ivs[k].iv));
    this._ivs = {};
  },

  /* Bip utilitaire neutre (confirmation d'action, notification UI) */
  beep(f, d){
    if(!_audioCtx || !_masterGain) return;
    f = f || 880; d = d || 0.09;
    _synthNote(f, d, 0.055, _audioCtx.currentTime,
      [{ratio:1,amp:1},{ratio:2,amp:0.30},{ratio:3,amp:0.10}],
      {a:0.005, d:0.018, sl:0.80, r:0.015}
    );
  },

  /* Confirmation d'action — deux notes montantes C5→G5, ton neutre */
  ok(){
    if(!_audioCtx || !_masterGain) return;
    var t    = _audioCtx.currentTime;
    var p    = [{ratio:1,amp:1},{ratio:2,amp:0.22}];
    var adsr = {a:0.005, d:0.018, sl:0.76, r:0.018};
    _synthNote(523.25, 0.088, 0.048, t,       p, adsr);   // C5
    _synthNote(783.99, 0.088, 0.048, t+0.112, p, adsr);   // G5
  },

  /* Sonnerie appel SAMU — mélodie courte, non confondue avec une alarme */
  ringTone(){
    if(!_audioCtx || !_masterGain) return;
    var t    = _audioCtx.currentTime;
    var p    = [{ratio:1,amp:1},{ratio:2,amp:0.40},{ratio:3,amp:0.15}];
    var adsr = {a:0.008, d:0.028, sl:0.70, r:0.024};
    _synthNote(440.00, 0.135, 0.052, t,       p, adsr);   // A4
    _synthNote(554.37, 0.135, 0.052, t+0.195, p, adsr);   // C#5
    _synthNote(440.00, 0.135, 0.052, t+0.390, p, adsr);   // A4
  },

  /* Pulse SpO2 synchronisé au battement — woodblock percussif */
  pl(fc, spo2){
    if(!_audioCtx || !_masterGain || fc <= 0) return;
    _playPulse(spo2);
  },

  /* Gestion alarmes patients
     lv = 0 : arrêt | 2 : jaune (moyenne prio) | 3 : rouge (haute prio)
     N'écrase pas une alarme rouge avec une jaune. */
  uA(id, lv){
    if(!this.allowed.has(id)){ this._si(id); return; }
    var cur = this._ivs[String(id)];
    if(lv === 0){
      this._si(id);
    } else if(lv === 3 && (!cur || cur.lv !== 3)){
      this._si(id);
      _playRedAlarm();
      var iv3 = setInterval(_playRedAlarm, 3500);
      this._ivs[String(id)] = {iv: iv3, lv: 3};
    } else if(lv === 2 && !cur){
      _playYelAlarm();
      var iv2 = setInterval(_playYelAlarm, 5200);
      this._ivs[String(id)] = {iv: iv2, lv: 2};
    }
  }
};

/* ═══════════════ PHYSIOLOGY ═══════════════ */
function calcGDS(p){var v=p.ventilation||{mode:"AA",fio2:21,fr:null,vt:null,peep:null};var fio2=v.fio2||21;let po=(fio2/100)*713*(.85-(fio2>60?.25:.15));if(v.peep&&v.peep>8)po+=v.peep*1.5;po=Math.max(30,Math.min(550,po+(Math.random()*8-4)));let pc=40;if(v.fr&&v.vt){pc=40*(5/Math.max(v.fr*v.vt/1000,1));pc=Math.max(15,Math.min(80,pc+(Math.random()*4-2)))}else if(p.vitals&&p.vitals.etco2)pc=p.vitals.etco2+2+Math.random()*3;const hc=Math.max(8,Math.min(32,24-(p.lactate>2?(p.lactate-2)*1.2:0)+(Math.random()*2-1)));const pH=6.1+Math.log10(hc/(.03*pc));return{ph:Math.max(6.8,Math.min(7.7,pH)),po:Math.round(po),pc:Math.round(pc*10)/10,hc:Math.round(hc*10)/10,be:Math.round((hc-24)*10)/10,pf:Math.round(po/(fio2/100)),lac:p.lactate||1}}
function calcSOFA(p){let s=0;const pf=(p.ventilation||{}).fio2>21?((Math.min(p.vitals.spo2,100)||0)/((p.ventilation||{}).fio2/100))*4.5:400;if(pf<100)s+=4;else if(pf<200)s+=3;else if(pf<300)s+=2;else if(pf<400)s+=1;if(p.vitals.pam===0)s+=4;else if((p.sap||[]).some(x=>x.drug.includes('Adrénaline')&&x.rate>2))s+=4;else if((p.sap||[]).some(x=>x.drug.includes('Noradrénaline')&&x.rate>3))s+=3;else if((p.sap||[]).some(x=>x.drug.includes('Noradrénaline')))s+=2;else if(p.vitals.pam<70)s+=1;if(p.vitals.rass<=-5||p.acrActive)s+=4;else if(p.vitals.rass<=-3)s+=3;else if(p.vitals.rass<=-1)s+=2;if(p.diurese===0)s+=4;else if(p.diurese<20)s+=3;else if(p.diurese<50)s+=2;if(p.lactate>6)s+=2;else if(p.lactate>2)s+=1;return Math.min(24,s)}

      "① HÉMOCULTURES aéro+anaéro x2 (sur 2 sites différents)",

  }

  return a.sort(function(x, y) { return x.p - y.p; });

function generateIncomingCall(){
  const motif=MOTIFS_REGUL[Math.floor(Math.random()*MOTIFS_REGUL.length)];
  const sex=Math.random()>.5?"M":"F";
  const prenom=sex==="M"?PRENOMS_H[Math.floor(Math.random()*PRENOMS_H.length)]:PRENOMS_F[Math.floor(Math.random()*PRENOMS_F.length)];
  const nom=NOMS[Math.floor(Math.random()*NOMS.length)];
  const age=motif.catego==="trauma"?18+Math.floor(Math.random()*50):motif.catego==="intox"?18+Math.floor(Math.random()*40):40+Math.floor(Math.random()*45);
  const weight=sex==="M"?65+Math.floor(Math.random()*30):50+Math.floor(Math.random()*25);
  const smurId="SMUR"+Math.floor(Math.random()*3+1);

  return{

    nom:nom+" "+prenom,sex,age,weight,
    smur:smurId,eta,
    motif:motif.motif,diag:motif.diag,ccmu:motif.ccmu,gravite:motif.gravite,
    catego:motif.catego,
    vitals:{...motif.vitals},

}

/* ══════ PHYSIOLOGIE & CONSTANTES VITALES ══════ */
{id:'fc',cat:'Physiologie',sub:'Constantes vitales',titre:'Fréquence Cardiaque (FC)',emoji:'💓',short:'Nombre de battements cardiaques par minute.',body:'DÉFINITION\nNombre de contractions ventriculaires par minute. Reflet du débit cardiaque conjointement au volume d\'éjection systolique (DC = FC × VES).\n\nVALEURS\n• Normale : 60–100 bpm\n• Tachycardie modérée : 100–130 bpm\n• Tachycardie sévère : > 130 bpm\n• Bradycardie : < 60 bpm (traiter si < 45 bpm avec signes de mauvaise tolérance)\n\nCAUSES DE TACHYCARDIE\nDouleur, fièvre, hypovolémie, sepsis, anémie, embolie pulmonaire, arythmies (FA, Flutter, TV, TSV), anxiété, iatrogénie (catécholamines).\n\nCAUSES DE BRADYCARDIE\nBêtabloquants, amiodarone, digoxine, TTM 33°C (attendue), bloc auriculo-ventriculaire, vagotonie, hyperkaliémie, hypothyroïdie.\n\nEN RÉANIMATION\nImpact direct sur le débit cardiaque. Tachycardie > 160 bpm : réduit le remplissage diastolique, risque ischémie coronaire. Bradycardie < 40 bpm : risque de syncope et d\'arrêt circulatoire.',tags:'fc tachycardie bradycardie rythme cardiaque débit'},
{id:'pam',cat:'Physiologie',sub:'Constantes vitales',titre:'Pression Artérielle Moyenne (PAM)',emoji:'🩸',short:'Pression de perfusion des organes. Objectif ≥ 65 mmHg en choc.',body:'DÉFINITION\nMoyenne pondérée de la pression artérielle sur un cycle cardiaque.\nFormule : PAM = (PAS + 2×PAD) / 3\n\nVALEURS NORMALES\n• PAM normale : 70–100 mmHg\n• PAS normale : 100–140 mmHg\n• PAD normale : 60–90 mmHg\n\nOBJECTIFS EN RÉANIMATION\n• Choc septique : PAM ≥ 65 mmHg (Surviving Sepsis Campaign)\n• HTIC : PAM cible selon PIC pour PPC > 60 mmHg\n• Post-ACR : PAM ≥ 65 mmHg\n• Éclampsie : PAS < 150 mmHg\n\nSIGNIFICATION\nReflet de la perfusion des organes (cerveau, rein, coronaires). Une PAM < 65 mmHg signe un état de choc. PAM < 35 mmHg pendant > 10 min : risque vital immédiat.',tags:'pam pas pad pression artérielle choc perfusion'},
{id:'spo2',cat:'Physiologie',sub:'Constantes vitales',titre:'SpO₂ — Saturation en Oxygène',emoji:'💨',short:'Saturation pulsée en oxygène. Normale ≥ 95%.',body:'DÉFINITION\nMesure non invasive de la saturation en oxygène de l\'hémoglobine par oxymétrie de pouls.\n\nVALEURS\n• Normale : 95–100%\n• Hypoxémie modérée : 90–94%\n• Hypoxémie sévère : < 90%\n• Critique : < 80%\n\nLIMITES DE LA SpO2\n• Intoxication au CO : faussement normale (HbCO non détectée)\n• Anémie sévère : SpO2 normale mais transport O2 insuffisant\n• Mauvaise perfusion périphérique : signal unreliable\n• Vernis à ongles, mélanine : perturbation possible\n\nOBJECTIFS THÉRAPEUTIQUES\n• Réanimation générale : SpO2 ≥ 92–96%\n• SDRA : SpO2 ≥ 88–92% acceptable (limiter O2 toxique)\n• Post-ACR : SpO2 94–98% (éviter hyperoxie)\n• BPCO : SpO2 cible 88–92%\n\nLIEN AVEC PaO2\nCourbe de dissociation Hb-O2 en S : SpO2 90% ≈ PaO2 60 mmHg. Chute rapide au-delà.',tags:'spo2 oxygène saturation hypoxémie oxymétrie'},
{id:'etco2',cat:'Physiologie',sub:'Constantes vitales',titre:'EtCO₂ — CO₂ en fin d\'expiration',emoji:'🌬',short:'Reflet de la ventilation et du débit cardiaque. Normale 35–45 mmHg.',body:'DÉFINITION\nConcentration de CO₂ mesurée en fin d\'expiration par capnographie. Approximation de la PaCO₂.\n\nVALEURS NORMALES : 35–45 mmHg\n\nSIGNIFICATION CLINIQUE\n• EtCO₂ élevé (> 50) : hypoventilation, bronchospasme, hyperthermie maligne\n• EtCO₂ bas (< 30) : hyperventilation, bas débit cardiaque, EP massive\n• EtCO₂ = 0 : déplacement de sonde, intubation œsophagienne, ACR\n\nEN RÉANIMATION ACR\nMarqueur de qualité du MCE : EtCO₂ > 10 mmHg = MCE efficace. EtCO₂ > 35–40 mmHg lors du MCE : prédictif de ROSC.\n\nEN VENTILATION\nSurveillance continue de la ventilation, détection déplacement IOT, titration FR et Vt.',tags:'etco2 co2 capnographie ventilation acr rcp'},
{id:'temp',cat:'Physiologie',sub:'Constantes vitales',titre:'Température Corporelle',emoji:'🌡',short:'Température centrale. Hyperthermie > 38.5°C, hypothermie < 36°C.',body:'VALEURS\n• Normale : 36.5–37.5°C\n• Fièvre : > 38°C\n• Hyperthermie : > 38.5°C\n• Fièvre sévère : > 40°C\n• Hypothermie légère : 32–35°C\n• Hypothermie modérée : 28–32°C\n• Hypothermie sévère : < 28°C\n\nHYPERTHERMIE EN RÉANIMATION\nSepsis, pneumonie, méningite, endocardite, DRESS syndrome, hyperthermie maligne. Traitement : paracétamol 1g IV, refroidissement physique, traitement étiologique.\n\nTTM (Targeted Temperature Management)\nAprès ACR récupéré : refroidissement à 33–36°C pendant 24h, puis réchauffement progressif < 0.5°C/h. Réduit les lésions neurologiques anoxiques.\nEffets attendus à 33°C : bradycardie (ne pas traiter si tolérée), hyperkaliémie relative.',tags:'température hyperthermie hypothermie ttm fièvre sepsis'},
{id:'gcs',cat:'Physiologie',sub:'Scores neurologiques',titre:'Score de Glasgow (GCS)',emoji:'🧠',short:'Score neurologique de 3 à 15. GCS ≤ 8 = coma, indication IOT.',body:'COMPOSANTES\n• Yeux (Y) : 4=spontané, 3=à la voix, 2=à la douleur, 1=aucune\n• Verbale (V) : 5=orienté, 4=confus, 3=mots, 2=sons, 1=aucune\n• Motrice (M) : 6=obéit, 5=localise, 4=retrait, 3=flexion, 2=extension, 1=aucune\n\nINTERPRÉTATION\n• 15 : normal\n• 13–14 : légèrement altéré\n• 9–12 : altération modérée\n• ≤ 8 : coma — indication d\'intubation oro-trachéale\n• 3 : score minimal (coma profond)\n\nEN PRATIQUE RÉANIMATION\nGCS ≤ 8 : protection des voies aériennes obligatoire avant tout transport ou geste. Réévaluation régulière (évolution dans le temps). Un GCS de 15 n\'exclut pas une pathologie grave.',tags:'glasgow gcs coma neurologie intubation'},
{id:'rass',cat:'Physiologie',sub:'Scores neurologiques',titre:'RASS — Richmond Agitation-Sedation Scale',emoji:'😴',short:'Échelle de sédation de -5 à +4. Cible habituelle -2 à 0.',body:'ÉCHELLE RASS\n+4 : Combatif — violence, danger immédiat\n+3 : Très agité — arrache cathéters, agressif\n+2 : Agité — mouvements non intentionnels, désadaptation ventilatoire\n+1 : Inquiet — anxieux, sans mouvements agressifs\n 0 : Éveillé et calme\n-1 : Somnolent — endormi, contact maintenu > 10s\n-2 : Sédation légère — contact bref < 10s\n-3 : Sédation modérée — ouverture des yeux à la voix, pas de contact\n-4 : Sédation profonde — réponse à la stimulation physique, pas à la voix\n-5 : Non réveillable — pas de réponse à la stimulation\n\nCIBLES THÉRAPEUTIQUES\n• Ventilation mécanique standard : RASS -2 à 0\n• SDRA sévère + curarisation : RASS -5\n• TTM 33°C : RASS -5\n• Réveil/sevrage ventilatoire : RASS 0\n\nMÉDICAMENTS\nPropofol, midazolam, sufentanil, dexmedetomidine (sevrage).',tags:'rass sédation agitation ventilation sédation analgésie'},
{id:'pic',cat:'Physiologie',sub:'Constantes vitales',titre:'PIC — Pression Intracrânienne',emoji:'🔴',short:'Normale < 15 mmHg. HTIC si > 20 mmHg. Urgence si > 30 mmHg.',body:'DÉFINITION\nPression à l\'intérieur de la boîte crânienne. Résultante des volumes cérébraux (parenchyme, LCR, sang).\n\nVALEURS\n• Normale : 5–15 mmHg\n• HTIC : > 20 mmHg\n• HTIC sévère : > 30 mmHg\n• Engagement imminent : > 40 mmHg\n\nPPC (Pression de Perfusion Cérébrale)\nPPC = PAM − PIC\n• Objectif : PPC > 60–70 mmHg\n• PPC < 50 mmHg : ischémie cérébrale\n\nTRAITEMENT HTIC\n• Tête à 30°, midline, analgosédation\n• Osmothérapie : Mannitol 20% 1g/kg IV en 20 min OU SSH 7.5% 100mL IV\n• Hyperventilation modérée (PaCO₂ 30–35 mmHg) — effet temporaire\n• Drainage LCR si capteur ventriculaire\n• Décompression chirurgicale (craniectomie) en dernier recours\n\nCAUSES\nTraumatisme crânien, hémorragie cérébrale, méningite, AVC ischémique massif, tumeur.',tags:'pic htic pression intracrânienne cerveau engagement'},
{id:'diurese',cat:'Physiologie',sub:'Constantes vitales',titre:'Diurèse',emoji:'💧',short:'Oligurie < 0.5 mL/kg/h. Anurie < 100 mL/24h.',body:'DÉFINITION\nVolume d\'urine produit par les reins par unité de temps.\n\nVALEURS\n• Normale : 0.5–1 mL/kg/h (35–70 mL/h pour 70 kg)\n• Oligurie : < 0.5 mL/kg/h (< 35 mL/h)\n• Anurie : < 100 mL/24h (< 5 mL/h)\n\nOLIGURIE EN RÉANIMATION\nCauses pré-rénales : hypovolémie, bas débit cardiaque, sepsis\nCauses rénales : IRA parenchymateuse (nécrose tubulaire), nephrotoxiques\nCauses post-rénales : obstacle (globe vésical, sonde bouchée)\n\nDÉMARCHE\n1. Vérifier sonde urinaire (perméabilité)\n2. Évaluer volémie (VCI échographique)\n3. Si hypovolémie → remplissage 250–500 mL\n4. Si euvolémique → Furosémide 40 mg IV\n5. Si persistance → indication EER\n\nSURVEILLANCE\nDiurèse horaire en réanimation. BES (bilan entrées-sorties) quotidien.',tags:'diurèse oligurie anurie rein bilan hydrique'},
{id:'lactate',cat:'Physiologie',sub:'Biologie',titre:'Lactatémie (Lactate artériel)',emoji:'⚡',short:'Marqueur d\'hypoperfusion. Normale < 2 mmol/L. Sévère > 4 mmol/L.',body:'DÉFINITION\nProduit final de la glycolyse anaérobie. Marqueur indirect de l\'adéquation entre apport et consommation en O₂ des tissus.\n\nVALEURS\n• Normale : < 2 mmol/L\n• Hypoperfusion modérée : 2–4 mmol/L\n• Hypoperfusion sévère / choc : > 4 mmol/L\n• Pronostique péjoratif : > 8 mmol/L\n\nSIGNIFICATION\nLactate élevé = anaérobiose tissulaire = inadéquation apport/consommation O₂. Peut refléter : choc (quelle que soit l\'étiologie), défaillance hépatique (métabolisme du lactate), iatrogénie (metformine, intoxication).\n\nEN PRATIQUE\nObjectif thérapeutique choc septique : clearance lactate > 10–20%/2h. Lactate > 2 mmol/L malgré réanimation = choc septique (définition Sepsis-3).\n\nSURVEILLANCE : /2–4h en choc actif.',tags:'lactate lactatémie choc hypoperfusion anaérobie sepsis'},
/* ══════ PHARMACOLOGIE — CATÉCHOLAMINES ══════ */
{id:'nad',cat:'Pharmacologie',sub:'Catécholamines',titre:'Noradrénaline (Norepinephrine)',emoji:'💊',short:'Vasopresseur de référence du choc septique. Agoniste α1 prédominant.',body:'CLASSE : Catécholamine — vasopresseur\n\nMÉCANISME\nAgoniste α1 (vasoconstriction puissante) et β1 faible (chronotrope et inotrope modéré). Augmente les résistances vasculaires systémiques → élève PAM.\n\nINDICATIONS\n• Choc septique (1ère ligne — SSC Guidelines)\n• Choc anaphylactique (après adrénaline)\n• Choc cardiogénique avec vasoplégie\n• Tout état de choc avec PAM < 65 mmHg\n\nPOSOLOGIE\n• Début : 0.1–0.3 µg/kg/min\n• Titration progressive jusqu\'à PAM ≥ 65 mmHg\n• Doses élevées : > 1 µg/kg/min (signe de gravité)\n• Concentration usuelle : 8 mg/48 mL (NAD concentrée)\n\nVOIE D\'ADMINISTRATION : VVC obligatoire (nécrose si extravasation)\n\nEFFETS INDÉSIRABLES\n• Tachycardie réflexe (rare — plutôt bradycardie)\n• Ischémie périphérique, coronaire si surdosage\n• DANGER : NAD sur tachycardie > 160 bpm → aggrave ischémie myocardique\n• DANGER : arrêt brutal sur choc actif → hypotension rebond sévère\n• DANGER : NAD sur OAP hypertensif → aggrave surcharge pulmonaire',tags:'noradrénaline nad vasopresseur choc septique catécholamine'},
{id:'adre',cat:'Pharmacologie',sub:'Catécholamines',titre:'Adrénaline (Epinephrine)',emoji:'💊',short:'Catécholamine mixte α+β. 1ère ligne ACR et anaphylaxie.',body:'CLASSE : Catécholamine — inotrope + vasopresseur\n\nMÉCANISME\nAgoniste α1+α2 (vasoconstriction) ET β1+β2 (tachycardie, inotropisme positif, bronchodilatation). Effet mixte dose-dépendant.\n\nINDICATIONS\n1. ACR : 1 mg IVD toutes les 3–5 min (protocole ALS)\n2. Anaphylaxie sévère : 0.5 mg IM cuisse (auto-injecteur)\n3. Choc réfractaire à la NAD\n4. Bradycardie avec ACR imminent\n\nEN DEHORS DE L\'ACR\n• 1 mg IVD hors ACR : tachycardie maligne + HTA grave → DANGER\n• SAP : 0.1–1 µg/kg/min\n\nPROTOCOLE ACR\nAdré 1 mg IVD dès que voie vasculaire disponible\nChoc non chocable (Asystolie/AESP) : Adré toutes les 2 cycles (4 min)\nChoc chocable (FV/TV) : Adré après 3ème choc puis toutes les 2 cycles',tags:'adrénaline épinéphrine acr anaphylaxie catécholamine'},
{id:'dobu',cat:'Pharmacologie',sub:'Catécholamines',titre:'Dobutamine',emoji:'💊',short:'Inotrope positif β1 sélectif. Choc cardiogénique avec bas débit.',body:'CLASSE : Catécholamine — inotrope positif\n\nMÉCANISME\nAgoniste β1 sélectif → augmente contractilité myocardique et FC. Effet vasodilatateur β2 modéré → baisse légère des RVS.\n\nINDICATIONS\n• Choc cardiogénique (FEVG effondrée)\n• Décompensation cardiaque aiguë avec bas débit\n• Post-ACR avec dysfonction myocardique\n\nPOSOLOGIE\n• Début : 2.5–5 µg/kg/min\n• Titration : jusqu\'à 20 µg/kg/min\n• Concentration : 250 mg/50 mL\n\nCONTRE-INDICATIONS / DANGERS\n• DANGER : dobutamine sur hypovolémie non corrigée → hypotension sévère + tachycardie\n• DANGER : dobutamine sur tachycardie > 130 bpm → risque tachyarythmie\n• Ne pas associer aux bêtabloquants en phase aiguë\n• FEVG < 25% → discuter ECMO-VA si pas de réponse',tags:'dobutamine inotrope choc cardiogénique insuffisance cardiaque'},
/* ══════ PHARMACOLOGIE — SÉDATION / ANALGÉSIE ══════ */
{id:'propofol',cat:'Pharmacologie',sub:'Sédation & Analgésie',titre:'Propofol',emoji:'💊',short:'Hypnotique IV. Sédation ventilée. CI chez non-intubé.',body:'CLASSE : Anesthésique/Hypnotique IV\n\nMÉCANISME\nPotentialise GABA-A → dépression SNC dose-dépendante. Propriétés anticonvulsivantes.\n\nINDICATIONS\n• Sédation en ventilation mécanique (patient intubé)\n• Induction anesthésique\n• Sédation procédurale courte\n\nPOSOLOGIE RÉANIMATION\n• IVSE : 5–50 µg/kg/min (0.3–3 mg/kg/h)\n• Concentration : 1g/50 mL (propofol 2%)\n\nDANGERS\n• DANGER ABSOLU : Propofol IVSE chez patient NON intubé → apnée + hypotension sévère\n• Hypotension dose-dépendante (vasodilatation)\n• Propofol infusion syndrome (PRIS) : > 48h à doses élevées → acidose métabolique, rhabdomyolyse, insuffisance cardiaque\n• Hypertriglycéridémie (émulsion lipidique)\n• Douleur à l\'injection sur VVP\n\nSURVEILLANCE : RASS cible, triglycérides /48h si > 48h.',tags:'propofol sédation hypnotique ventilation mécanique'},
{id:'sufentanil',cat:'Pharmacologie',sub:'Sédation & Analgésie',titre:'Sufentanil',emoji:'💊',short:'Opioïde de référence en réanimation. Analgésie + sédation.',body:'CLASSE : Opioïde puissant (agoniste µ)\n\nMÉCANISME\nLiaison aux récepteurs µ opioïdes : analgésie, sédation, dépression respiratoire, réduction de la réponse au stress.\n\nINDICATIONS\n• Analgésie-sédation en ventilation mécanique\n• Douleur post-opératoire\n• Anesthésie balancée\n\nPOSOLOGIE\n• IVSE : 0.1–0.5 µg/kg/h (adulte ≈ 1–5 mL/h)\n• Concentration : 250 µg/50 mL\n• Bolus : 5–10 µg IVD pour procédures douloureuses\n\nDANGERS\n• Dépression respiratoire (dose-dépendante)\n• DANGER : sufentanil sur hypoventilation préexistante et patient non intubé → apnée\n• Rigidité thoracique aux fortes doses\n• Iléus, constipation (usage prolongé)\n• Tolérance et dépendance (sevrage progressif)\n\nANTIDOTE : Naloxone (0.4 mg IVD, renouvelable)',tags:'sufentanil opioïde analgésie sédation ventilation'},
{id:'midazolam',cat:'Pharmacologie',sub:'Sédation & Analgésie',titre:'Midazolam',emoji:'💊',short:'Benzodiazépine. Anxiolyse, sédation, anticonvulsivant.',body:'CLASSE : Benzodiazépine — anxiolytique/hypnotique/anticonvulsivant\n\nMÉCANISME\nPotentialise GABA-A. Propriétés anxiolytiques, sédatives, myorelaxantes et anticonvulsivantes.\n\nINDICATIONS\n• Anxiolyse procédurale\n• Sédation légère à modérée\n• Traitement des convulsions (1ère ou 2ème ligne)\n• Induction anesthésique\n• Pré-médication\n\nPOSOLOGIE\n• Bolus anxiolyse : 1–2 mg IVD (titration)\n• Bolus sédation : 2–5 mg IVD\n• IVSE sédation réanimation : 0.02–0.1 mg/kg/h\n\nDANGERS\n• Dépression respiratoire (surtout si associé aux opioïdes)\n• DANGER : midazolam sur décompensation respiratoire chez non-intubé → aggrave hypoxémie\n• Hypotension\n• Accumulation chez insuffisant hépatique ou rénal\n• ANTIDOTE : Flumazénil (mais CI si épileptique)',tags:'midazolam benzodiazépine sédation anxiolyse convulsions'},
{id:'ketamine',cat:'Pharmacologie',sub:'Sédation & Analgésie',titre:'Kétamine',emoji:'💊',short:'Anesthésique dissociatif. Maintient les réflexes et la TA.',body:'CLASSE : Anesthésique dissociatif — antagoniste NMDA\n\nMÉCANISME\nBloque les récepteurs NMDA → anesthésie dissociative (amnésie + analgésie + sédation). Stimule le système sympathique → maintient TA et FC.\n\nAVANTAGES EN URGENCE\n• Maintien de la PA (contrairement au propofol)\n• Préserve les réflexes laryngés (attention vigilance)\n• Bronchodilatateur (utile en crise d\'asthme sévère)\n• Analgésique puissant\n• Pas de dépression respiratoire significative aux doses sub-anesthésiques\n\nINDICATIONS\n• Induction anesthésique rapide (ISR) : 1–2 mg/kg IV\n• Analgésie-sédation procédurale\n• Asthme réfractaire\n• Hypovolémie sévère (maintien TA)\n\nCONTRE-INDICATIONS RELATIVES\n• HTIC : augmente la PIC (relatif — débattu)\n• Psychoses (risque d\'hallucinations)\n• HTA sévère non contrôlée\n\nPOSOLOGIE : Anesthésie 1–2 mg/kg IV, Analgésie 0.1–0.5 mg/kg IV',tags:'kétamine dissociatif anesthésie urgence hypotension'},
{id:'cisatracurium',cat:'Pharmacologie',sub:'Sédation & Analgésie',titre:'Cisatracurium (Nimbex®)',emoji:'💊',short:'Curare non dépolarisant. Curarisation SDRA, TTM. ABSOLUMENT chez patient intubé.',body:'CLASSE : Curare non dépolarisant (bloquant neuromusculaire)\n\nMÉCANISME\nBloque la jonction neuromusculaire en compétition avec l\'acétylcholine → paralysie musculaire complète.\n\nINDICATIONS\n• SDRA sévère (P/F < 150) : facilite la ventilation protectrice, réduit la dyssynergie\n• Intubation oro-trachéale (induction)\n• TTM 33°C (prévention des frissons)\n• Transport de patient instable\n\nPOSOLOGIE IVSE\n• Réanimation : 0.1–0.2 mg/kg/h\n• Concentration : 200 mg/50 mL\n\nDANGER ABSOLU\n• DANGER MORTEL : curare sur patient NON intubé → paralysie respiratoire immédiate → asphyxie → ACR\n• Ne jamais administrer sans garantie de ventilation mécanique en place\n\nSURVEILLANCE : Train-of-Four (TOF) — cible 1–2 réponses sur 4. Assurer analgosédation suffisante (patient curarisé ne peut pas exprimer sa douleur).',tags:'cisatracurium curare neuromusculaire sdra ventilation mécanique'},
/* ══════ PHARMACOLOGIE — REMPLISSAGE ══════ */
{id:'nacl',cat:'Pharmacologie',sub:'Remplissage vasculaire',titre:'NaCl 0.9% — Sérum Physiologique',emoji:'💧',short:'Soluté cristalloïde isotonique. Remplissage de 1ère intention.',body:'COMPOSITION : Na+ 154 mmol/L, Cl- 154 mmol/L. Osmolalité 308 mOsm/L.\n\nINDICATIONS\n• Remplissage vasculaire initial (choc hypovolémique, septique)\n• Dilution médicaments IV\n• Rinçage perfusions\n\nEFFETS INDÉSIRABLES\n• Acidose hyperchlorémique (Cl- élevé) si volumes importants\n• DANGER : remplissage NaCl sur OAP hypertensif → aggrave surcharge pulmonaire\n• DANGER : sur HTIC → légère augmentation PIC (préférer SSH ou mannitol)\n• Hypernatrémie si volumes excessifs\n\nPOSOLOGIE RÉANIMATION\n• Bolus 250–500 mL en 15–30 min, réévaluation après\n• Test de remplissage : 250 mL / 10 min (PLR préférable)\n\nPLACE VS RINGER LACTATE\nRinger préféré en polytrauma (moins de chlore). NaCl préféré si alcalose métabolique.',tags:'nacl sérum physiologique cristalloïde remplissage choc'},
{id:'ringer',cat:'Pharmacologie',sub:'Remplissage vasculaire',titre:'Ringer Lactate',emoji:'💧',short:'Cristalloïde équilibré. Préféré en trauma et chirurgie.',body:'COMPOSITION : Na+ 130, K+ 4, Ca++ 1.5, Cl- 109, Lactate 28 mmol/L. Osmolalité 278 mOsm/L.\n\nAVANTAGES\n• Moins d\'acidose hyperchlorémique que NaCl 0.9%\n• Plus physiologique\n• Recommandé en polytrauma, chirurgie digestive\n\nPRÉCAUTIONS\n• Contient du lactate → ne pas interpréter la lactatémie en cours de perfusion\n• Contient du K+ → précaution en hyperkaliémie\n• DANGER : sur OAP → aggrave surcharge\n\nPOSOLOGIE : Bolus 500 mL–1L selon contexte.',tags:'ringer lactate cristalloïde remplissage trauma'},
{id:'cgr',cat:'Pharmacologie',sub:'Remplissage vasculaire',titre:'CGR — Concentré de Globules Rouges',emoji:'🩸',short:'Transfusion érythrocytaire. Seuil transfusionnel Hb < 7–8 g/dL.',body:'DÉFINITION : Produit sanguin labile contenant les érythrocytes d\'un don.\n\nINDICATIONS\n• Hb < 7 g/dL chez patient stable\n• Hb < 8–9 g/dL chez coronarien, post-ACR, choc hémorragique actif\n• Anémie symptomatique (dyspnée, tachycardie, angine)\n\nPOSOLOGIE\n• 1 CGR ≈ 300 mL, élève l\'Hb d\'environ 1 g/dL\n• Protocole transfusion massive : CGR + PFC + CPA (ratio 1:1:1)\n\nPRÉCAUTIONS\n• Compatibilité ABO/Rhésus obligatoire\n• RAI (Recherche Anticorps Irréguliers) avant transfusion programmée\n• Durée de perfusion : 30–90 min par CGR\n• Surveillance signes réaction transfusionnelle\n\nCOMPLICATIONS : Réaction hémolytique, œdème pulmonaire lésionnel transfusionnel (TRALI), surcharge volémique (TACO).',tags:'cgr transfusion érythrocytes hémoglobine anémie'},
{id:'pfc',cat:'Pharmacologie',sub:'Remplissage vasculaire',titre:'PFC — Plasma Frais Congelé',emoji:'🩸',short:'Apport de facteurs de coagulation. Coagulopathie, transfusion massive.',body:'DÉFINITION : Plasma congelé contenant tous les facteurs de coagulation (I à XIII), anticoagulants naturels, fibrinogène.\n\nINDICATIONS\n• Coagulopathie sévère (TP < 40%)\n• Hémorragie active avec trouble de la coagulation\n• Transfusion massive (protocole 1:1:1 avec CGR et CPA)\n• Surdosage AVK avec hémorragie grave\n\nPOSOLOGIE : 10–15 mL/kg IV (3 PFC pour un adulte moyen)\n\nPRÉCAUTIONS\n• Compatibilité ABO nécessaire\n• Décongélation rapide (20 min)\n• Risque TACO (surcharge volémique)\n• Risque TRALI',tags:'pfc plasma coagulation coagulopathie transfusion'},
{id:'cpa',cat:'Pharmacologie',sub:'Remplissage vasculaire',titre:'CPA — Concentré Plaquettaire',emoji:'🩸',short:'Transfusion plaquettaire. Seuil < 50 G/L en hémorragie active.',body:'INDICATIONS\n• Plaquettes < 50 G/L avec hémorragie active\n• Plaquettes < 20 G/L (transfusion prophylactique)\n• Avant geste invasif si plaquettes < 50 G/L\n• Protocole transfusion massive\n\nPOSOLOGIE : 1 unité adulte (pool de 4 dons) ≈ 50 G/L d\'augmentation plaquettaire\n\nPRÉCAUTIONS\n• ABO préférentiel\n• Durée de vie courte (5 jours)\n• Agitation continue jusqu\'à utilisation\n• PTIA (purpura thrombopénique immuno-allergique) : CI plaquettes en urgence',tags:'plaquettes cpa transfusion thrombopénie hémorragie'},
{id:'actranex',cat:'Pharmacologie',sub:'Remplissage vasculaire',titre:'Acide Tranexamique (Exacyl®)',emoji:'💊',short:'Antifibrinolytique. Hémorragie traumatique. Dans l\'heure — max 3h.',body:'CLASSE : Antifibrinolytique\n\nMÉCANISME\nInhibition compétitive du plasminogène → bloque la fibrinolyse → stabilise le caillot.\n\nINDICATIONS\n• Hémorragie traumatique grave : dans les 3h après le trauma (CRASH-2)\n• Hémorragie du post-partum\n• Hémorragie chirurgicale\n\nPOSOLOGIE\n• 1 g IV en 10 min puis 1 g en 8h\n• CRASH-2 : significativement bénéfique si < 1h, encore bénéfique si 1–3h, DÉLÉTÈRE si > 3h\n\nCONTRE-INDICATIONS\n• CIVD avec fibrinolyse (relatif)\n• Antécédent thrombo-embolique récent\n• Hématurie macroscopique (risque caillotage urétéral)\n\nIMPORTANT : Ne traite pas la coagulopathie (TP, plaquettes, fibrinogène) — ne remplace pas PFC/CPA.',tags:'acide tranexamique antifibrinolytique hémorragie trauma'},
{id:'albumine',cat:'Pharmacologie',sub:'Remplissage vasculaire',titre:'Albumine 4%',emoji:'💧',short:'Colloïde naturel. Hypoalbuminémie sévère, cirrhose.',body:'INDICATION\n• Remplissage en alternative aux cristalloïdes chez cirrhotique avec PBP\n• Hypoalbuminémie sévère < 20 g/L symptomatique\n• Plasmaphérèse\n• Choc réfractaire après épuisement cristalloïdes (off-label)\n\nPOSOLOGIE : 250 mL IV en 1–2h\n\nLIMITES\n• Coûteux\n• Pas supérieur aux cristalloïdes en choc septique (SAFE trial)\n• Contre-indiqué si allergie albumine',tags:'albumine colloïde remplissage hypoalbuminémie cirrhose'},
/* ══════ PHARMACOLOGIE — URGENCES MÉDICALES ══════ */
{id:'amiodarone',cat:'Pharmacologie',sub:'Urgences médicales',titre:'Amiodarone (Cordarone®)',emoji:'💊',short:'Antiarythmique classe III. FA, TV, FV réfractaire en ACR.',body:'CLASSE : Antiarythmique classe III (bloquant canaux K+)\n\nMÉCANISME\nProlonge la durée du potentiel d\'action. Effet β-bloquant, Ca-bloquant et Na-bloquant associé.\n\nINDICATIONS\n• FA à réponse ventriculaire rapide : 300 mg IV en 1h\n• TV avec pouls bien tolérée : 150 mg IV en 10 min puis 300 mg/24h\n• FV/TV réfractaire (ACR) : 300 mg IVD après 3ème CEE\n• Prévention des récidives arythmiques\n\nPRÉCAUTIONS\n• DANGER : amiodarone sur FC normale → bradycardie + hypotension\n• Bradycardie ++ (surtout si associée aux bêtabloquants)\n• Allonge le QT (torsades de pointes si hypokaliémie)\n• Hépatotoxicité, pneumopathie, dysthyroïdie (usage chronique)\n• T1/2 très longue : 40–55 jours',tags:'amiodarone antiarythmique fa tv fv acr'},
{id:'atropine',cat:'Pharmacologie',sub:'Urgences médicales',titre:'Atropine',emoji:'💊',short:'Anticholinergique. Bradycardie symptomatique. Max 3 mg IV.',body:'CLASSE : Anticholinergique (antagoniste muscarinique)\n\nMÉCANISME\nBloque les récepteurs muscariniques → lève la bradycardie vagale → augmente FC.\n\nINDICATIONS\n• Bradycardie symptomatique (PAM basse, signes de bas débit)\n• Bradycardie peropératoire\n• Intoxication aux organophosphorés (anticholinestérasiques) — doses massives\n\nPOSOLOGIE\n• Bradycardie : 0.5 mg IVD, renouvelable toutes les 3–5 min\n• Dose max : 3 mg IV (dose atropinique totale)\n• En dessous de 0.5 mg : risque de bradycardie paradoxale !\n\nEFFETS INDÉSIRABLES\n• Tachycardie, sécheresse buccale, mydriase, rétention urinaire\n• Confusion chez le sujet âgé\n• CI glaucome angle fermé\n\nSI INEFFICACE : Isuprel IVSE ou entraînement électrosystolique (EES).',tags:'atropine bradycardie anticholinergique vagotonie'},
{id:'naloxone',cat:'Pharmacologie',sub:'Urgences médicales',titre:'Naloxone (Narcan®)',emoji:'💊',short:'Antidote opioïdes. 0.4 mg IVD renouvelable. T1/2 courte !',body:'CLASSE : Antagoniste compétitif des récepteurs opioïdes\n\nMÉCANISME\nDéplace les opioïdes de leurs récepteurs µ → lève la dépression respiratoire et la sédation.\n\nINDICATIONS\n• Intoxication aux opioïdes (héroïne, morphine, fentanyl, codéine)\n• Surdosage morphinique iatrogène\n\nPOSOLOGIE\n• 0.4 mg IVD — titration par 0.1 mg si patient dépendant (éviter sevrage brutal)\n• Renouvelable toutes les 2–3 min\n• Relais IVSE si opioïde à longue durée d\'action (T1/2 > naloxone)\n\nATTENTION\n• T1/2 courte : 30–60 min → risque resédation (réintoxication) si opioïde à longue T1/2\n• Syndrome de sevrage si patient dépendant (agitation, hypertension, tachycardie)\n• Ne pas administrer en post-op si patient douloureux : lève toute analgésie',tags:'naloxone antidote opioïde intoxication morphine'},
{id:'furosemide',cat:'Pharmacologie',sub:'Urgences médicales',titre:'Furosémide (Lasilix®)',emoji:'💊',short:'Diurétique de l\'anse. OAP, oligurie sur euvolémie.',body:'CLASSE : Diurétique de l\'anse (inhibiteur cotransporteur Na-K-2Cl)\n\nINDICATIONS\n• OAP : 40–80 mg IV (diurèse rapide)\n• Oligurie sur euvolémie (après avoir éliminé hypovolémie)\n• HTA hypertensive urgente avec surcharge\n• Hypercalcémie\n\nPOSOLOGIE\n• OAP : 40 mg IVD, peut répéter à 40–80 mg si pas de réponse en 30 min\n• Oligurie : 40 mg IVD (1 mg/kg)\n• Doses élevées possibles : 250 mg/24h IVSE\n\nEFFETS INDÉSIRABLES\n• Hypokaliémie ++ (surveillance K+ obligatoire)\n• Hyponatrémie, hypovolémie\n• Ototoxicité (doses élevées)\n• Hyperglycémie\n\nCONTRE-INDICATIONS\n• Hypovolémie (DANGER : aggrave le choc)\n• Insuffisance rénale sévère (relative)',tags:'furosémide lasilix diurétique oap oligurie'},
{id:'mannitol',cat:'Pharmacologie',sub:'Urgences médicales',titre:'Mannitol 20%',emoji:'💊',short:'Osmothérapie HTIC. 0.5–1 g/kg IV en 20 min. Osmolarité cible < 320.',body:'CLASSE : Diurétique osmotique\n\nMÉCANISME\nCréée un gradient osmotique → attire l\'eau du parenchyme cérébral vers le secteur vasculaire → réduit PIC. Diurèse osmotique associée.\n\nINDICATIONS\n• HTIC aiguë (traumatisme crânien, AVC hémorragique, méningite)\n• Engagement cérébral imminent\n• Rhabdomyolyse (prévention IRA)\n\nPOSOLOGIE\n• HTIC : 0.5–1 g/kg IV (250 mL de mannitol 20% pour 70 kg) en 20 min\n• Renouvelable si osmolalité < 320 mOsm/L\n• Osmolalité sérique cible : 300–320 mOsm/L (ne pas dépasser 320)\n\nSURVEILLANCE\n• Ionogramme / osmolalité /6h\n• Diurèse horaire (polyurie attendue)\n• Natrémie (hypernatrémie fréquente)\n\nALTERNATIVE : SSH 7.5% 100 mL IV — plus rapide, plus maniable.',tags:'mannitol osmothérapie htic pression intracrânienne'},
{id:'glucoca',cat:'Pharmacologie',sub:'Urgences médicales',titre:'Gluconate de Calcium',emoji:'💊',short:'Cardioprotecteur en hyperkaliémie. 1 g IVD en 5 min.',body:'INDICATIONS URGENTES\n• Hyperkaliémie aiguë sévère (K+ > 6.5 mmol/L ou signes ECG)\n• Hypocalcémie symptomatique (spasme, tétanie, arythmie)\n• Intoxication aux inhibiteurs calciques\n\nMÉCANISME EN HYPERKALIÉMIE\nNe baisse pas le K+ mais stabilise la membrane myocardique → protège le cœur des arythmies liées à l\'hyperkaliémie.\n\nPOSOLOGIE\n• 1–2 g IV lent (5–10 min)\n• Effet en 1–3 min, durée 30–60 min\n• Renouveler si ECG toujours modifié\n\nACTIONS COMPLÉMENTAIRES SUR HYPERKALIÉMIE\n• Bicarbonate de sodium (alcalinisation → entrée K+ intra-cellulaire)\n• Insuline + G30% (entrée K+ cellulaire en 20 min)\n• Kayexalate (résine échangeuse d\'ions — élimination K+)\n• Épuration extra-rénale (si insuffisance rénale sévère)',tags:'gluconate calcium hyperkaliémie hypocalcémie cardioprotection'},
{id:'nac',cat:'Pharmacologie',sub:'Urgences médicales',titre:'N-Acétylcystéine (NAC)',emoji:'💊',short:'Antidote intoxication paracétamol. À débuter dans les 8–10h.',body:'CLASSE : Antidote hépatique — précurseur du glutathion\n\nMÉCANISME\nCompense la déplétion en glutathion hépatique causée par le métabolite toxique du paracétamol (NAPQI) → protège les hépatocytes.\n\nINDICATION\n• Intoxication au paracétamol (acétaminophène)\n• Décision selon nomogramme de Rumack-Matthew\n\nPROTOCOLE IV (Acetadote®)\n• Phase 1 : 150 mg/kg en 60 min\n• Phase 2 : 50 mg/kg en 4h\n• Phase 3 : 100 mg/kg en 16h\n• Total : 300 mg/kg sur 21h\n\nEFFETS INDÉSIRABLES\n• Réaction anaphylactoïde (10–15%) lors de la phase 1 : flush, bronchospasme → ralentir perfusion\n• Si patient asthmatique : prémédication antihistaminique\n\nSURVEILLANCE : ASAT/ALAT, TP, INR, créatinine toutes les 12–24h.',tags:'nac acétylcystéine antidote paracétamol intoxication foie'},
/* ══════ PHARMACOLOGIE — ANTI-INFECTIEUX ══════ */
{id:'tazocilline',cat:'Pharmacologie',sub:'Anti-infectieux',titre:'Tazocilline — Pipéracilline/Tazobactam (Tazocilline®)',emoji:'💊',short:'Pénicilline à large spectre. Sepsis communautaire. CI si allergie pénicilline.',body:'CLASSE : Bêta-lactamine — Pénicilline + inhibiteur de bêtalactamase\n\nSPECTRE\nLarge spectre : entérobactéries (dont BLSE si tazo sensible), Pseudomonas, anaérobies, streptocoques. Ne couvre pas : SARM, Enterococcus faecium résistant.\n\nINDICATIONS\n• Sepsis communautaire sévère\n• Pneumonie, infection intra-abdominale, pyélonéphrite\n• Prophylaxie chirurgicale\n\nPOSOLOGIE\n• 4 g/0.5 g IV toutes les 6–8h\n• En sepsis grave : perfusion prolongée (4–6h) pour optimiser PK/PD\n\nDANGER\n• CONTRE-INDICATION ABSOLUE si allergie aux pénicillines\n• Réaction croisée possible avec céphalosporines (10% théorique, rare en pratique)\n• En cas d\'allergie péni documentée → utiliser céphalosporine 3G + métronidazole ou carbapénème\n\nSURVEILLANCE : Créatinine (néphrotoxicité relative), TP (effet AVK-like aux fortes doses).',tags:'tazocilline pipéracilline antibiotique sepsis pénicilline allergie'},
{id:'cefotaxime',cat:'Pharmacologie',sub:'Anti-infectieux',titre:'Céfotaxime / Ceftriaxone',emoji:'💊',short:'Céphalosporine 3G. Méningite, pneumonie. Possible si allergie péni (hors choc).',body:'CLASSE : Céphalosporine de 3ème génération (C3G)\n\nSPECTRE\nStreptococcus pneumoniae, méningocoque, H. influenzae, entérobactéries sensibles. Pas de Pseudomonas, SARM, anaérobies.\n\nINDICATIONS\n• Méningite bactérienne : céfotaxime 4 g/6h (ou ceftriaxone 4 g/24h)\n• Pneumonie communautaire sévère\n• Infection urinaire grave\n• Sepsis à entérobactéries sensibles\n\nPOSOLOGIE\n• Céfotaxime méningite : 4 g IVL sur 30 min toutes les 6h (dose méningée)\n• Ceftriaxone : 1–4 g/24h selon indication\n\nALLERGIE PÉNICILLINE\nRéaction croisée théorique 10%. En pratique, C3G utilisable si allergie sans choc anaphylactique documenté. Contre-indiqué si allergie sévère (choc).',tags:'céphalosporine c3g méningite pneumonie ceftriaxone'},
{id:'meropenem',cat:'Pharmacologie',sub:'Anti-infectieux',titre:'Méropénème / Imipénème',emoji:'💊',short:'Carbapénème. Dernier recours. BGN résistants, BLSE, Pseudomonas.',body:'CLASSE : Carbapénème (bêta-lactamine à très large spectre)\n\nSPECTRE\nUltra-large : entérobactéries (y compris BLSE), Pseudomonas, Acinetobacter, anaérobies. Ne couvre pas : SARM, ERV.\n\nINDICATIONS\n• Sepsis à bacilles Gram-négatif résistants (BLSE documentée)\n• Infections nosocomiales sévères\n• Neutropénie fébrile à haut risque\n• Infection à Pseudomonas aeruginosa documentée\n\nPOSOLOGIE\n• 1 g IV toutes les 8h (standard)\n• 2 g IV/8h en perfusion prolongée (Pseudomonas, infections sévères)\n\nRÉSISTANCE\nCarbapénémases (KPC, NDM, OXA-48) : résistance aux carbapénèmes → solution : ceftazidime/avibactam, colistine (dernier recours).\n\nIMPORTANT : Antibiotique de réserve. Usage raisonné pour préserver son efficacité.',tags:'méropénème carbapénème blse résistance antibiotique'},
/* ══════ PHARMACOLOGIE — ANTICOAGULANTS / THROMBOLYSE ══════ */
{id:'heparine',cat:'Pharmacologie',sub:'Anticoagulants',titre:'Héparine Non Fractionnée (HNF)',emoji:'💊',short:'Anticoagulant IV immédiat. EP, FA, SCA. Antidote : sulfate de protamine.',body:'MÉCANISME : Potentialise l\'antithrombine III → inhibe facteurs IIa (thrombine) et Xa.\n\nINDICATIONS\n• Embolie pulmonaire massive (5000 UI IVD puis IVSE)\n• Syndrome coronarien aigu (SCA)\n• FA avec risque thrombo-embolique\n• Circuits extracorporels (EER, ECMO, CEC)\n\nPOSOLOGIE\n• Bolus : 80 UI/kg puis 18 UI/kg/h IVSE (héparine standard)\n• Adaptation selon TCA cible : 2–3 fois le témoin\n\nDANGERS\n• TIH (thrombopénie induite par l\'héparine) : J5–J21, paradoxalement thrombogène → arrêt et alternative (argatroban)\n• Hémorragie (surdosage)\n• CI : hémorragie active, AVCH, plaquettes < 50 G/L\n\nANTIDOTE : Sulfate de protamine 1 mg pour 100 UI d\'héparine.',tags:'héparine anticoagulant ep fa sca hnf'},
{id:'tpa',cat:'Pharmacologie',sub:'Anticoagulants',titre:'Thrombolyse — rtPA (Altéplase, Actilyse®)',emoji:'💊',short:'Thrombolyse fibrinolytique. EP massive, IDM, AVC ischémique.',body:'CLASSE : Fibrinolytique — Activateur du plasminogène tissulaire recombinant\n\nMÉCANISME\nActive le plasminogène → plasmine → lyse du thrombus.\n\nINDICATIONS ET POSOLOGIES\n• EP massive avec état de choc : 100 mg IV en 2h\n• IDM (si pas de coronarographie) : 15 mg bolus + 50 mg/30min + 35 mg/60min\n• AVC ischémique < 4.5h : 0.9 mg/kg (max 90 mg) dont 10% en bolus\n• ACR réfractaire avec EP suspectée : 50 mg IVD\n\nCONTRE-INDICATIONS ABSOLUES\n• AVCH, hémorragie active, chirurgie < 10 jours\n• Coagulopathie (TP < 50%), PA non contrôlée (PAS > 185 pour AVC)\n• Tumeur intracrânienne, anévrisme\n\nDANGERS\n• DANGER ABSOLU : thrombolyse sur AVCH → hémorragie massive\n• Après thrombolyse : pas d\'anticoagulant pendant 24h\n• Surveillance : signe hémorragique, pression artérielle',tags:'rtpa thrombolyse ep iDM avc altéplase fibrinolytique'},
/* ══════ PROCÉDURES & DISPOSITIFS ══════ */
{id:'iot',cat:'Procédures',sub:'Voies aériennes',titre:'Intubation Oro-Trachéale (IOT)',emoji:'🔧',short:'Protection des voies aériennes. Indiquée si GCS ≤ 8, détresse respi, ACR.',body:'DÉFINITION\nMise en place d\'une sonde endotrachéale à ballonnet à travers la glotte pour assurer la ventilation mécanique et protéger les voies aériennes.\n\nINDICATIONS\n• GCS ≤ 8 (protection des VAS)\n• Détresse respiratoire sévère réfractaire aux thérapeutiques\n• Choc hémodynamique grave instable\n• ACR\n• Transport de patient instable\n• Geste nécessitant anesthésie générale en urgence\n\nTECHNIQUE — ISR (Induction en Séquence Rapide)\n1. Pré-oxygénation 100% FiO2 ≥ 3 min\n2. Drogues : kétamine 1.5–2 mg/kg + succinylcholine 1 mg/kg (ou rocuronium 1.2 mg/kg)\n3. Laryngoscopie directe ou vidéolaryngoscopie\n4. Vérification position (auscultation + capnographie)\n\nPOST-INTUBATION\n• Radio thorax (position sonde : 3–5 cm de la carène)\n• Analgosédation (propofol + sufentanil)\n• Réglages ventilatoires initiaux : VAC, Vt 6 mL/kg PIT, FR 16, FiO2 100%\n\nCOMPLICATIONS\nIntubation sélective, intubation œsophagienne, traumatisme dentaire, hypoxémie, arythmie.',tags:'iot intubation voies aériennes ventilation mécanique'},
{id:'extubation',cat:'Procédures',sub:'Voies aériennes',titre:'Extubation',emoji:'🔧',short:'Ablation de la sonde d\'intubation. Critères stricts à respecter.',body:'CRITÈRES D\'EXTUBATION (TOUS REQUIS)\n• Cause de l\'intubation résolue\n• Conscience : RASS > -2, obéit aux ordres simples\n• Autonomie respiratoire : FR < 30, SpO2 > 92% sous FiO2 ≤ 50%\n• Hémodynamique stable (sans vasopresseur ou faible dose)\n• Toux efficace, déglutition présente\n• Pas d\'hypersécrétion bronchique massive\n\nÉPREUVE DE VENTILATION SPONTANÉE (EVS)\n• VS-AI réduite (5–8 cmH2O) ou pièce en T pendant 30–120 min\n• Si tolérance → extubation\n\nDANGERS\n• Extubation sur RASS < -2 : risque inhalation, obstruction VAS\n• Stridor post-extubation : corticoïdes, adrénaline nébulisée\n• Échec d\'extubation (20–30%) : réintubation nécessaire\n• Laryngospasme\n\nSURVEILLANCE POST-EXTUBATION : SpO2, FR, sécrétion, tolérance clinique.',tags:'extubation sevrage ventilation intubation critères'},
{id:'vni',cat:'Procédures',sub:'Voies aériennes',titre:'VNI — Ventilation Non Invasive',emoji:'🔧',short:'Alternative non invasive à l\'IOT. OAP, BPCO décompensé, immunodéprimé.',body:'DÉFINITION\nVentilation à pression positive délivrée par masque (facial, nasal, casque) sans intubation.\n\nINDICATIONS\n• OAP cardiogénique : 1ère ligne (CPAP ou BiPAP)\n• BPCO décompensé hypercapnique\n• Patient immunodéprimé en détresse respiratoire (éviter pneumonie sous ventilation)\n• Insuffisance respiratoire post-extubation\n\nMODES\n• CPAP (Continuous Positive Airway Pressure) : pression positive continue — OAP\n• BiPAP/VS-AI+PEP : aide inspiratoire + PEP — BPCO, hypercapnie\n\nRÉGLAGES INITIAUX\n• AI : 8–12 cmH2O (titrer sur VT 7–8 mL/kg)\n• PEP : 5–8 cmH2O\n• FiO2 : pour SpO2 ≥ 92–95%\n\nCONTRE-INDICATIONS\n• GCS < 12, agitation non contrôlée\n• Vomissements (risque inhalation)\n• Trouble déglutition sévère\n• Instabilité hémodynamique majeure\n\nSURVEILLANCE : pH, PaCO2, FC, SpO2, fuite, tolérance au masque.',tags:'vni ventilation non invasive oap bpco masque'},
{id:'vvc',cat:'Procédures',sub:'Accès vasculaires',titre:'VVC — Voie Veineuse Centrale',emoji:'🔧',short:'Cathéter veineux profond. Administration vasopresseurs, monitoring PVC, nutrition.',body:'SITES D\'INSERTION\n• Jugulaire interne : guidage échographique recommandé\n• Sous-clavière : moins infectée, pneumothorax possible\n• Fémorale : plus infectée, TVP, moins de pneumothorax\n\nINDICATIONS\n• Administration de catécholamines (NAD, Adré — nécrose sur VVP)\n• Mesure de la PVC\n• Voie d\'alimentation parentérale\n• Administration de médicaments veineux irritants\n• Absence d\'abord veineux périphérique\n\nTECHNIQUE\n• Désinfection chirurgicale, champ stérile\n• Échoguidage recommandé (réduction complications)\n• Vérification radio thorax (position, pneumothorax)\n\nCOMPLICATIONS\n• Pneumothorax (sous-clavière ++) \n• Hémothorax, hématome\n• Infection sur cathéter (ILC) : < 1.5 pour 1000 jours-cathéter en réa\n• Thrombose veineuse\n• Embolie gazeuse\n\nINFECTION\nRemplacement toutes les 7–14 jours (protocole). Panser stérilement. VERROU antibiotique si ILC suspectée.',tags:'vvc voie centrale cathéter jugulaire vasopresseur'},
{id:'ktart',cat:'Procédures',sub:'Accès vasculaires',titre:'Cathéter Artériel (KT artériel)',emoji:'🔧',short:'Monitoring continu de la PA. Mesure invasive. Prélèvements itératifs.',body:'SITES : Radiale (1ère intention), fémorale, humérale\n\nINDICATIONS\n• Mesure continue et non interrompue de la PA (monitoring invasif)\n• Prélèvements artériels itératifs (GDS)\n• Choc nécessitant titration serrée des vasopresseurs\n• Chirurgie cardiaque, vasculaire, neurochirurgie\n\nTECHNIQUE\n• Test d\'Allen (radiale) : évaluation circulation collatérale cubitale\n• Calibrage zéro à l\'oreillette droite\n• Rince continu avec NaCl hépariné 3 UI/mL\n\nAVANTAGES\n• Valeur beat-to-beat (chaque battement)\n• Courbe d\'onde de pouls : analyse PPV (Pulse Pressure Variation) pour prédit réponse au remplissage\n• Pas d\'interruption pour prise tension\n\nCOMPLICATIONS\n• Thrombose artérielle / ischémie distale\n• Hématome, hémostase prolongée\n• Infection (moins fréquente que VVC)',tags:'cathéter artériel pression artérielle invasive gds monitoring'},
{id:'ktio',cat:'Procédures',sub:'Accès vasculaires',titre:'KT Intra-Osseux (EZ-IO)',emoji:'🔧',short:'Voie d\'urgence en cas d\'échec accès veineux. Tous médicaments en urgence.',body:'DÉFINITION\nAccès vasculaire par forage dans la cavité médullaire d\'un os (tibia proximal, humérus, sternum).\n\nINDICATIONS\n• Arrêt cardio-respiratoire (ACR) sans voie vasculaire disponible en 2 min\n• Accès veineux impossible en urgence\n• Tout âge (nourrisson à adulte)\n\nSITES\n• Tibia proximal : 2 cm sous la tubérosité tibiale antérieure, face antéro-médiale\n• Humérus proximal : grande tubérosité\n\nTECHNIQUE (EZ-IO)\n• Foret motorisé, aiguille 25–45 mm selon corpulence\n• Aspiration de moelle osseuse = confirmation\n• Rinçage NaCl 0.9% 10 mL (douleur ++ si conscient)\n\nMÉDICAMENTS UTILISABLES\nTous les médicaments IV, y compris catécholamines, amiodarone, adrénaline ACR.\n\nLIMITES : Fracture locale, prothèse, ostéoporose sévère, infection cutanée locale.',tags:'intra-osseux io ezio accès vasculaire urgence acr'},
{id:'drain',cat:'Procédures',sub:'Drains & Sondes',titre:'Drain Thoracique',emoji:'🔧',short:'Pneumothorax, hémothorax, pleurésie. Drain en pleuroscopie ou chirurgical.',body:'INDICATIONS\n• Pneumothorax compressif : exsufflation à l\'aiguille EN PREMIER, puis drain\n• Pneumothorax spontané de grande taille\n• Hémothorax (> 500 mL)\n• Épanchement pleural massif compressif\n• Post-chirurgie thoracique\n\nTECHNIQUE\n• Site : 5ème espace intercostal, ligne axillaire antérieure (triangle de sécurité)\n• Repérage échographique recommandé\n• Insertion au bord supérieur de la côte (éviter pédicule)\n• Connexion à un système de drainage (drain 3 chambres)\n\nSURVEILLANCE\n• Mobilité : oscillation du liquide à la respiration\n• Bullage : présence → fuite aérienne active\n• Quantité drainage /h\n• Radio thorax de contrôle\n\nPNEUMOTHORAX COMPRESSIF — URGENCE VITALE\nDécompression en urgence à l\'aiguille (2ème EIC, ligne médio-claviculaire) avant drain si choc.',tags:'drain thoracique pneumothorax hémothorax pleurésie'},
{id:'pericarde',cat:'Procédures',sub:'Drains & Sondes',titre:'Ponction Péricardique (Péricardiocentèse)',emoji:'🔧',short:'Tamponnade — urgence vitale. Sous écho. Voie sous-xiphoïdienne.',body:'INDICATION URGENTE\n• Tamponnade cardiaque avec choc (triade de Beck : hypotension, turgescence jugulaire, bruits cardiaques assourdis)\n• Épanchement péricardique abondant compromettant l\'hémodynamique\n\nTECHNIQUE\n• Voie sous-xiphoïdienne (entre xiphoïde et rebord costal gauche)\n• Guidage échographique OBLIGATOIRE si non urgent\n• Aiguille 18 G, direction céphalique vers l\'épaule gauche\n\nSIGNES DE PONCTION CORRECTE\n• Aspiration de liquide non coagulant (si coagule → sang ventriculaire → retirer !)\n• Amélioration hémodynamique immédiate\n\nCOMPLICATIONS\n• Ponction du ventricule droit\n• Arythmie\n• Pneumothorax\n\nDANGER : ponction péricardique sans tamponnade documentée → risque lésion ventriculaire.',tags:'péricardiocentèse tamponnade péricarde urgence'},
{id:'mce',cat:'Procédures',sub:'ACR & Réanimation',titre:'MCE — Massage Cardiaque Externe',emoji:'🔧',short:'Compressions thoraciques. 100–120/min, 5–6 cm, relâchement complet.',body:'DÉFINITION\nCompressions thoraciques rythmées pour maintenir une circulation artificielle pendant l\'ACR.\n\nTECHNIQUE BLS (Basic Life Support)\n• Fréquence : 100–120 compressions/min\n• Profondeur : 5–6 cm (adulte)\n• Relâchement complet entre chaque compression (ne pas s\'appuyer)\n• Interruptions minimales (< 5 secondes)\n• Rapport compressions/ventilations : 30:2 (sans voie aérienne avancée)\n\nAVEC VOIE AÉRIENNE AVANCÉE (IOT)\n• Compressions continues 100–120/min\n• Ventilation asyncrhone 10/min\n\nMARQUEUR D\'EFFICACITÉ\n• EtCO₂ > 10 mmHg = MCE efficace\n• EtCO₂ > 35–40 = prédicteur de ROSC\n\nCHANGEMENT D\'OPÉRATEUR : toutes les 2 min (fatigue → perte d\'efficacité)\n\nDILEMME ÉTHIQUE\nDurée recommandée : > 30–45 min avant arrêt, sauf hypothermie sévère (ne pas arrêter en dessous de 35°C sans réchauffement).',tags:'mce massage cardiaque acr rcp compressions'},
{id:'cee',cat:'Procédures',sub:'ACR & Réanimation',titre:'CEE — Choc Électrique Externe (Défibrillation)',emoji:'⚡',short:'FV et TV sans pouls : choc non synchronisé 200 J. TV avec pouls : synchronisé.',body:'PRINCIPES\nDéfibrillation (CEE non synchronisé) : FV et TV sans pouls\nCardioversion (CEE synchronisé) : arythmies avec pouls (FA, Flutter, TV tolérée)\n\nPROTOCOLE DÉFIBRILLATION (ACR)\n• Énergie 1er choc : 200 J biphasique (ou 360 J monophasique)\n• Chocs suivants : 200–360 J\n• Reprendre MCE IMMÉDIATEMENT après le choc (2 min)\n• Pas de vérification du rythme immédiate\n\nCHOCS CHOCABLES : FV, TV sans pouls\nCHOCS NON CHOCABLES : Asystolie, AESP (pas de CEE)\n\nCARDIOVERSION (Flutter, FA, TV tolérée)\n• Synchronisé sur l\'onde R\n• Énergie : 100–200 J (FA), 50–100 J (Flutter)\n• Sédation obligatoire (propofol ou kétamine)\n\nDANGERS\n• CEE sur rythme non chocable : aucun bénéfice, retarde la prise en charge\n• Brûlures cutanées si mauvais contact électrodes\n• Distance de sécurité : ne jamais toucher le patient lors du choc',tags:'cee défibrillation choc électrique fv tv acr'},
{id:'dv',cat:'Procédures',sub:'Gestes spéciaux',titre:'Décubitus Ventral (DV)',emoji:'🔧',short:'SDRA sévère (P/F < 150). 16h/24h. Améliore oxygénation + survie.',body:'DÉFINITION\nPositionnement du patient intubé ventilé sur le ventre pendant 16h consécutives minimum.\n\nINDICATION\n• SDRA sévère avec P/F < 150 malgré PEP ≥ 5, FiO2 > 60% (Guérin et al., NEJM 2013)\n\nBÉNÉFICES\n• Amélioration homogénéisation ventilation/perfusion\n• Réduction des zones d\'atélectasie postérieures\n• Amélioration drainage sécrétions\n• Réduction mortalité : 16 vs 32% (essai PROSEVA)\n\nTECHNIQUE\n• Équipe de 4–5 personnes minimum\n• Procédure de retournement standardisée\n• Sécurisation VVC, KT art, IOT, drains\n• Coussins de soutien (front, thorax, pelvis)\n\nCONTRE-INDICATIONS\n• Instabilité hémodynamique sévère\n• Fractures rachidiennes non stabilisées\n• Plaies chirurgicales abdominales ouvertes\n• HTIC non contrôlée\n\nCOMPLICATIONS\n• Escarres faciales, oculaires\n• Extubation accidentelle\n• Œdème facial',tags:'décubitus ventral dv sdra oxygénation'},
{id:'eer',cat:'Procédures',sub:'Gestes spéciaux',titre:'EER — Épuration Extra-Rénale (Dialyse)',emoji:'🔧',short:'Anurie + défaillance rénale sévère. CVVHDF ou hémodialyse intermittente.',body:'DÉFINITION\nTechnique de suppléance rénale remplaçant les fonctions d\'épuration, d\'équilibre hydro-électrolytique et acido-basique.\n\nINDICATIONS EN RÉANIMATION\n• Anurie / oligurie réfractaire aux diurétiques\n• Acidose métabolique sévère (pH < 7.15) réfractaire\n• Hyperkaliémie sévère > 6.5 mmol/L résistante au traitement médical\n• Œdème pulmonaire réfractaire avec surcharge\n• Urémie symptomatique (encéphalopathie, péricardite)\n• Intoxication par substance dialysable\n\nMODES EN RÉANIMATION\n• CVVHDF (Continue) : mieux toléré hémodynamiquement — préféré en choc\n• Hémodialyse intermittente : si patient stable\n\nACCÈS VASCULAIRE : Cathéter de dialyse (double lumière) en jugulaire, fémorale ou sous-clavière.\n\nSURVEILLANCE : ionogramme, urée, créatinine, débit filtration, anticoagulation du circuit.',tags:'eer épuration extra-rénale dialyse anurie ira'},
/* ══════ VENTILATION MÉCANIQUE ══════ */
{id:'vac',cat:'Ventilation',sub:'Modes ventilatoires',titre:'Mode VAC — Ventilation Assistée Contrôlée',emoji:'🫁',short:'Mode de référence en réanimation. Volume garanti, fréquence imposée.',body:'DÉFINITION\nMode ventilatoire à volume contrôlé : le respirateur délivre un volume courant (Vt) à une fréquence réglée, quelle que soit l\'activité du patient.\n\nPARAMÈTRES RÉGLABLES\n• Vt (volume courant) : 6 mL/kg de Poids Idéal Théorique (PIT)\n• FR (fréquence respiratoire) : 12–20/min selon la PaCO₂\n• FiO₂ : 100% initialement, à réduire\n• PEP (PEEP) : 5 cmH2O de base, augmenter si SDRA\n• Trigger inspiratoire\n\nVENTILATION PROTECTRICE (SDRA)\n• Vt ≤ 6 mL/kg PIT (volutraumatisme si > 8 mL/kg)\n• Pression plateau ≤ 30 cmH2O\n• PEP adaptée (table ARDSnet)\n• FiO₂ à réduire progressivement\n\nPIT (Poids Idéal Théorique)\n• Homme : 50 + 0.91 × (taille cm − 152.4)\n• Femme : 45.5 + 0.91 × (taille cm − 152.4)\n\nCOMPLICATIONS VENTILATOIRES\n• Volutraumatisme (Vt excessif)\n• Barotraumatisme (Pression plateau > 30 cmH2O)\n• Atélectraumatisme (PEEP insuffisante)\n• VAP (pneumonie acquise sous ventilation)',tags:'vac ventilation mécanique vt peep sdra fio2'},
{id:'psv',cat:'Ventilation',sub:'Modes ventilatoires',titre:'PSV / VS-AI — Aide Inspiratoire',emoji:'🫁',short:'Mode de sevrage. Patient déclenche les cycles. Préserve la musculature.',body:'DÉFINITION\nMode ventilatoire spontané assisté : le patient déclenche les cycles respiratoires, le respirateur amplifie l\'effort inspiratoire par une aide en pression (AI).\n\nINDICATIONS\n• Sevrage de la ventilation mécanique\n• Épreuve de ventilation spontanée (VS-AI 8/5)\n• Ventilation non invasive (VNI)\n\nPARAMÈTRES\n• AI (Aide Inspiratoire) : 8–12 cmH₂O (progressive réduction lors du sevrage)\n• PEP : 5–8 cmH₂O\n• FiO₂ selon SpO₂ cible\n\nCRITÈRES DE TOLÉRANCE\n• FR < 30/min\n• SpO₂ > 92%\n• VT > 5 mL/kg\n• Pas de balancement thoracoabdominal\n• Bonne tolérance clinique\n\nCONTRE-INDICATIONS\n• Patient curarisé (pas d\'effort spontané → apnée)\n• RASS < -4 (pas de déclenchement)\n• Patient en ACR',tags:'psv aide inspiratoire sevrage ventilation spontanée'},
{id:'pfrat',cat:'Ventilation',sub:'Indices ventilatoires',titre:'Ratio P/F (PaO₂/FiO₂)',emoji:'🫁',short:'Index d\'oxygénation. Définit la sévérité du SDRA. < 300 = SDRA.',body:'DÉFINITION\nRatio entre la PaO₂ artérielle (mmHg) et la FiO₂ (fraction, 0–1).\nFormule : P/F = PaO₂ / FiO₂\n\nVALEURS NORMALES : 400–500 mmHg\n\nCLASSIFICATION SDRA (Berlin 2012)\n• SDRA léger : 200 < P/F ≤ 300\n• SDRA modéré : 100 < P/F ≤ 200\n• SDRA sévère : P/F ≤ 100\n\nEXEMPLE\nPaO₂ = 60 mmHg, FiO₂ = 0.5 (50%) → P/F = 60/0.5 = 120 → SDRA modéré\n\nOBJECTIFS THÉRAPEUTIQUES\n• P/F < 150 → indication DV + curarisation\n• P/F < 80 malgré DV + PEP optimale → discussion ECMO veino-veineuse\n\nLIMITES\n• Dépend de la PEP (augmenter PEP → améliore P/F artificiellement)\n• Doit être mesuré à PEP stable',tags:'pf ratio oxygénation sdra fio2 pao2 berlin'},
/* ══════ PROTOCOLES & ALGORITHMES ══════ */
{id:'acr',cat:'Protocoles',sub:'Arrêt Cardio-Respiratoire',titre:'Protocole ACR — Algorithme ALS',emoji:'📋',short:'Arrêt cardio-respiratoire. RCP immédiate. Chaine de survie.',body:'DÉFINITION\nCessation de toute activité mécanique cardiaque efficace. Urgence vitale absolue.\n\nCHAÎNE DE SURVIE (ERC)\n1. Reconnaissance précoce + appel secours\n2. RCP précoce (BLS)\n3. Défibrillation précoce\n4. Soins avancés (ALS)\n5. Soins post-réanimation\n\nALGORITHME ALS\n• MCE 100–120/min, profondeur 5–6 cm\n• IOT dès que possible (ou masque laryngé)\n• Voie vasculaire (VVP/VVC/IO)\n• Rythme analysé toutes les 2 min\n\nRYTHMES CHOCABLES (CEE)\n• FV (Fibrillation Ventriculaire)\n• TV sans pouls (Tachycardie Ventriculaire)\n→ CEE 200 J biphasique immédiat\n→ Adrénaline 1 mg IVD après 3ème choc puis /4 min\n→ Amiodarone 300 mg après 3ème choc\n\nRYTHMES NON CHOCABLES (pas de CEE)\n• Asystolie\n• AESP (Activité Électrique Sans Pouls)\n→ Adrénaline 1 mg IVD dès 1er cycle\n→ Recherche et traitement des 4H/4T\n\n4H : Hypoxie, Hypovolémie, Hypo/Hyperkaliémie, Hypothermie\n4T : Thrombose (EP/coronaire), Tamponnade, Toxiques, Tension (PNO)',tags:'acr arrêt cardiaque rcp als bls fv tv asystolie aesp'},
{id:'rosc',cat:'Protocoles',sub:'Arrêt Cardio-Respiratoire',titre:'Post-ACR — ROSC et TTM',emoji:'📋',short:'ROSC = Return Of Spontaneous Circulation. TTM 33–36°C pendant 24h.',body:'ROSC (Return Of Spontaneous Circulation)\nReprise d\'une activité cardiaque efficace spontanée.\n\nCRITÈRES ROSC\n• Pouls palpable\n• PA mesurable\n• EtCO₂ > 35–40 mmHg\n• Signes de vie\n\nPRISE EN CHARGE POST-ROSC\n• Voie aérienne sécurisée (IOT si pas fait)\n• Objectifs hémodynamiques : PAM ≥ 65 mmHg, SpO₂ 94–98%, PaO₂ 75–100 mmHg\n• PaCO₂ : normocapnie (35–45 mmHg)\n• ECG 12 dérivations : syndrome coronarien aigu ? → coronarographie urgente\n• TDM cérébral si cause neurologique suspectée\n\nTTM (Targeted Temperature Management)\n• Indication : ACR récupéré, patient comateux (GCS < 8) après ACR extra-hospitalier sur FV/TV\n• Cible : 33–36°C pendant 24h (débat actuel sur la cible optimale)\n• Méthode : couverture refroidissante (Arctic Sun), lavage intragastrique froid, NaCl froid IV\n• Réchauffement progressif : ≤ 0.25°C/h après les 24h\n• À 33°C : bradycardie attendue (ne pas traiter si PAM correcte), hyperkaliémie modérée\n\nPRONOSTIC NEUROLOGIQUE : évaluation à 72h minimum après arrêt de la sédation.',tags:'rosc post-acr ttm hypothermie thérapeutique réanimation'},
{id:'sepsis3',cat:'Protocoles',sub:'Sepsis',titre:'Sepsis-3 — Définition et Prise en Charge',emoji:'📋',short:'Dysfonction organique vie-menaçante sur infection. Lactate > 2 + vasopresseur = choc.',body:'DÉFINITIONS SEPSIS-3 (2016)\n• Sepsis : dysfonction d\'organe menaçant le pronostic vital, causée par une réponse de l\'hôte à une infection\n• Choc septique : sepsis + besoin de vasopresseur pour PAM ≥ 65 + lactate > 2 mmol/L\n• Score SOFA : outil de définition de la dysfonction d\'organe\n\nqSOFA (screening) ≥ 2 : FR ≥ 22, altération conscience, PAS ≤ 100\n\nHEURE 1 (Surviving Sepsis Campaign Bundle)\n1. Lactate artériel\n2. Hémocultures (2 sites, aéro+anaéro) AVANT antibiotiques\n3. Antibiotiques à large spectre dans l\'HEURE\n4. Remplissage : cristalloïdes 30 mL/kg en 3h (si hypoperfusion)\n5. Vasopresseur (NAD) si PAM < 65 malgré remplissage\n\nOBJECTIFS\n• PAM ≥ 65 mmHg\n• Lactate < 2 mmol/L (ou clearance > 10–20%/2h)\n• Diurèse > 0.5 mL/kg/h\n• SpO₂ ≥ 92%\n\nANTIBIOTIQUES\n• Communautaire : Tazocilline + Amikacine OU C3G selon foyer\n• Nosocomial : Méropénème ± vancomycine\n• Adapter à 48–72h selon antibiogramme',tags:'sepsis choc septique ssc bactériémie antibiotiques'},
{id:'sdra_proto',cat:'Protocoles',sub:'SDRA',titre:'SDRA — Syndrome de Détresse Respiratoire Aiguë',emoji:'📋',short:'P/F < 300. Ventilation protectrice, PEP, DV si sévère. Berlin 2012.',body:'DÉFINITION (Berlin 2012)\n• Début aigu (< 1 semaine)\n• Opacités bilatérales à la radio (non expliquées par épanchement, atélectasie)\n• Œdème lésionnel (non cardiogénique)\n• P/F < 300 sous PEEP ≥ 5 cmH₂O\n\nSÉVÉRITÉ\n• Léger : P/F 200–300\n• Modéré : P/F 100–200\n• Sévère : P/F < 100\n\nSTRATÉGIE VENTILATOIRE (ARDSnet)\n• Vt = 6 mL/kg PIT (max 8 mL/kg)\n• Pression plateau ≤ 30 cmH₂O\n• PEP selon table ARDSnet (FiO₂/PEP)\n• FR ajustée sur PaCO₂ (permissive jusqu\'à 50–55 mmHg)\n• Objectif SpO₂ 88–95%\n\nTHÉRAPIES COMPLÉMENTAIRES\n• DV 16h/24h si P/F < 150 (bénéfice mortalité prouvé)\n• Curarisation 24–48h si P/F < 150 et désadaptation\n• ECMO VV si P/F < 80 malgré stratégie optimale\n• Pas de corticoïdes en phase précoce (< 14j)\n\nCAUSES\nPneumonie, SDRA post-ACR, inhalation, sepsis, trauma, pancréatite.',tags:'sdra ventilation protectrice peep dv curarisation berlin'},
{id:'htic_proto',cat:'Protocoles',sub:'Neurologie',titre:'HTIC — Hypertension Intracrânienne',emoji:'📋',short:'PIC > 20 mmHg. PPC = PAM − PIC cible > 60 mmHg.',body:'DÉFINITION\nPIC > 20 mmHg de façon soutenue.\n\nSIGNES CLINIQUES\n• Triade de Cushing : bradycardie + hypertension + bradypnée (engagement)\n• Mydriase unilatérale, anisocorie (engagement temporal)\n• Vomissements en jet, céphalées\n• Altération de conscience\n\nPRINCIPE : Boîte de Monro-Kellie\nVolume crânien fixe = parenchyme + LCR + sang. Toute augmentation d\'un compartiment → compression des autres → ↑ PIC.\n\nPRISE EN CHARGE\n• Tête à 30°, midline, pas de compression jugulaire\n• Objectif PAM pour PPC > 60–70 mmHg (NAD si nécessaire)\n• Sédation-analgésie (réduit métabolisme cérébral)\n• Normothermie (hyperthermie aggrave les lésions)\n• Normoglycémie\n• Osmothérapie : mannitol 20% 1g/kg OU SSH 7.5% 100 mL\n• Hyperventilation modérée (PaCO₂ 30–35) : TEMPORAIRE (vasoconstriction rapide)\n• Drainage LCR si capteur ventriculaire\n• Chirurgie décompressive en dernier recours\n\nSURVEILLANCE : PIC continue, PPC, GCS, pupilles.',tags:'htic pression intracrânienne pic ppc engagement cerveau'},
/* ══════ PATHOLOGIES ══════ */
{id:'choc_sep',cat:'Pathologies',sub:'États de choc',titre:'Choc Septique',emoji:'🏥',short:'Choc distributif sur infection. PAM < 65 + vasopresseur + lactate > 2.',body:'DÉFINITION (Sepsis-3)\nCombination d\'un sepsis et d\'une défaillance circulatoire nécessitant un vasopresseur pour maintenir PAM ≥ 65 mmHg et lactate > 2 mmol/L malgré remplissage adéquat.\n\nPHYSIOPATHOLOGIE\nInfection → libération cytokines → vasodilatation massive (↓ RVS) + dysfonction myocardique + augmentation perméabilité capillaire → inadéquation apport/consommation O₂.\n\nPRÉSENTATION\n• Phase chaude : peau rouge, chaude, tachycardie, pouls bondissant, PAM basse\n• Phase froide (choc avancé) : vasoconstriction périphérique, marbrures, extrémités froides\n\nTRATEMENT (voir protocole Sepsis-3)\n• Remplissage cristalloïdes 30 mL/kg\n• NAD (vasopresseur 1ère ligne) pour PAM ≥ 65\n• Antibiotiques dans l\'heure\n• Contrôle du foyer (chirurgie, drainage)\n• Hydrocortisone 200 mg/24h si choc réfractaire\n\nPRONOSTIC : Mortalité 30–50% selon défaillances d\'organes.',tags:'choc septique sepsis vasopresseur infection'},
