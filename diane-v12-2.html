{id:'choc_card',cat:'Pathologies',sub:'États de choc',titre:'Choc Cardiogénique',emoji:'🏥',short:'Défaillance pompe cardiaque. FEVG effondrée. Dobutamine + NAD.',body:'DÉFINITION\nChoc par défaillance primaire de la pompe cardiaque → bas débit cardiaque → hypoperfusion tissulaire.\n\nCRITÈRES\n• PAM < 65 mmHg\n• Index cardiaque < 2.2 L/min/m²\n• Pression capillaire pulmonaire > 15 mmHg\n• Signes d\'hypoperfusion (marbrures, lactate élevé)\n\nCAUSES\n• IDM massif (75% des cas)\n• CMD (cardiomyopathie dilatée)\n• Myocardite fulminante\n• Valvulopathie aiguë (IA aiguë, IM aiguë)\n• Post-ACR (stunning myocardique)\n\nTRAITEMENT\n• Dobutamine 5–20 µg/kg/min (inotrope positif)\n• NAD si PAM < 65 (vasopresseur)\n• Diurétiques si surcharge (CONTRE-INDIQUÉ si hypovolémie)\n• CONTRE-INDIQUÉS : bêtabloquants en phase aiguë, remplissage massif\n• Discussion ECMO-VA si réfractaire\n• Coronarographie urgente si IDM\n\nPRONOSTIC : Mortalité 40–80% selon étiologie.',tags:'choc cardiogénique dobutamine fevg iDM infarctus'},
{id:'choc_hem',cat:'Pathologies',sub:'États de choc',titre:'Choc Hémorragique',emoji:'🏥',short:'Hypovolémie absolue sur hémorragie. Transfusion massive. Damage control.',body:'CLASSES (ATLS)\n• Classe I : < 750 mL (< 15% volémie) — signes discrets\n• Classe II : 750–1500 mL — tachycardie\n• Classe III : 1500–2000 mL — hypotension + tachycardie\n• Classe IV : > 2000 mL (> 40%) — choc profond, mortalité élevée\n\nPRINTCIPES DAMAGE CONTROL\n1. Contrôle hémorragique (garrots, compression, chirurgie)\n2. Transfusion massive (ratio CGR:PFC:CPA = 1:1:1)\n3. Hypotension permissive (PAM 50–65 mmHg jusqu\'au contrôle chirurgical)\n4. Prévention hypothermie-acidose-coagulopathie (triade létale)\n5. Acide tranexamique 1g IVD dès que possible (< 3h)\n\nCONTRE-INDIQUÉS\n• Remplissage massif cristalloïdes seuls (dilue les facteurs de coagulation)\n• NaCl 0.9% en excès (acidose hyperchlorémique)\n\nVASOPRESSEURS : NAD si chirurgie non immédiate. Adrénaline si choc profond.',tags:'choc hémorragique trauma transfusion damage control'},
{id:'choc_obst',cat:'Pathologies',sub:'États de choc',titre:'Choc Obstructif',emoji:'🏥',short:'Obstruction mécanique au débit cardiaque. EP, tamponnade, PNO compressif.',body:'MÉCANISME\nObstacle au remplissage cardiaque droit ou gauche → chute débit cardiaque → choc.\n\nCAUSES\n• Embolie pulmonaire massive\n• Tamponnade cardiaque\n• Pneumothorax compressif\n• HTAP aiguë sévère\n\nPRÉSENTATION COMMUNE\n• Hypotension + tachycardie + signes droits (turgescence jugulaire)\n• Pas de réponse au remplissage\n\nTRAITEMENT ÉTIOLOGIQUE\n• EP massive : thrombolyse (rtPA 100 mg) ± cathétérisme ± thrombectomie\n• Tamponnade : péricardiocentèse en urgence\n• PNO compressif : exsufflation à l\'aiguille IMMÉDIATE puis drain\n\nERREUR THÉRAPEUTIQUE FRÉQUENTE\nRemplissage excessif → aggrave la compression cardiaque droite en EP et tamponnade.',tags:'choc obstructif embolie tamponnade pneumothorax'},
{id:'choc_ana',cat:'Pathologies',sub:'États de choc',titre:'Choc Anaphylactique',emoji:'🏥',short:'Réaction IgE-médiée sévère. Adrénaline 0.5 mg IM IMMÉDIAT.',body:'DÉFINITION\nRéaction d\'hypersensibilité immédiate IgE-médiée menaçant le pronostic vital.\n\nPRÉSENTATION\n• Systémique : urticaire, œdème de Quincke\n• Respiratoire : bronchospasme, stridor, œdème laryngé\n• Cardiovasculaire : hypotension, tachycardie, choc\n• Digestive : vomissements, douleurs abdominales\n\nALLERGÈNES FRÉQUENTS EN RÉANIMATION\nAntibiotiques (pénicillines ++), curares, latex, produits de contraste, colloïdes.\n\nTRAITEMENT IMMÉDIAT\n1. ADRÉNALINE : 0.5 mg IM face antérolatérale cuisse (en dehors de l\'hôpital)\n2. En réanimation : 0.1 mg IVD titré OU IVSE\n3. Remplissage cristalloïdes rapide (1–2 L)\n4. Corticoïdes (méthylprednisolone 1 mg/kg) — effet différé 4–6h\n5. Antihistaminiques (effet symptomatique limité)\n\nVOIES AÉRIENNES : IOT précoce si œdème laryngé (progressif, irréversible !)\n\nSURVEILLANCE : Tryptase sanguine à 1h (marqueur anaphylaxie)',tags:'anaphylaxie choc allergique adrénaline pénicilline'},
{id:'ep',cat:'Pathologies',sub:'Pathologies cardio-pulmonaires',titre:'Embolie Pulmonaire (EP)',emoji:'🏥',short:'Obstruction artère pulmonaire. D-Dimères, angio-TDM, héparines.',body:'DÉFINITION\nOcclusion d\'une ou plusieurs artères pulmonaires par un thrombus (thrombo-embolie veineuse).\n\nSÉVÉRITÉ (ESC 2019)\n• Faible risque : pas de choc, VD non dilaté, troponine normale\n• Risque intermédiaire : pas de choc mais marqueurs élevés\n• Haut risque (massive) : choc ou arrêt cardio-respiratoire\n\nPRÉSENTATION\n• Dyspnée brutale, douleur thoracique pleurale\n• Tachycardie sinusale, tachypnée\n• Hypoxémie (SpO₂ basse sans cause évidente)\n• D-Dimères élevés (sensibilité 98% mais spécificité faible)\n\nSIGNES DE GRAVITÉ\n• Choc hémodynamique, syncope, ACR\n• VD dilaté à l\'ETT (septum paradoxal)\n• Troponine élevée (nécrose VD)\n\nDIAGNOSTIC : Angio-TDM thoracique (gold standard)\n\nTRAITEMENT\n• Héparine 5000 UI IVD puis IVSE (anticoagulation)\n• EP massive + choc : thrombolyse rtPA 100 mg en 2h\n• Vasopresseurs (NAD), remplissage limité (500 mL max)\n• Oxygénothérapie, IOT si nécessaire\n• Discuter thrombectomie/cathétérisme si CI thrombolyse',tags:'embolie pulmonaire ep thrombolyse héparine anticoagulant'},
{id:'tamponnade',cat:'Pathologies',sub:'Pathologies cardio-pulmonaires',titre:'Tamponnade Cardiaque',emoji:'🏥',short:'Épanchement péricardique compressif. Triade de Beck. Péricardiocentèse urgente.',body:'DÉFINITION\nAccumulation de liquide dans le péricarde comprimant les cavités cardiaques → chute débit cardiaque.\n\nTRIADE DE BECK\n• Hypotension artérielle\n• Turgescence jugulaire (veines jugulaires distendues)\n• Bruits cardiaques assourdis\n\nSIGNES COMPLÉMENTAIRES\n• Pouls paradoxal (chute PAS > 10 mmHg en inspiration)\n• Tachycardie compensatrice\n• Bas voltage ECG, alternance électrique\n\nCAUSES\n• Néoplasique (hémopéricarde sur métastase)\n• Post-traumatique (hémopéricarde)\n• Péricardite exsudative\n• Iatrogène (post-sonde, post-chirurgie cardiaque)\n\nDIAGNOSTIC : ETT (échocardiographie) — collapsus OD/VD en diastole\n\nTRAITEMENT\n• Péricardiocentèse en urgence (évacuation guidée écho)\n• Chirurgie (fenêtre péricardique) si récidive ou hémopéricarde caillotant\n• NE PAS donner de diurétiques (aggrave)\n• Remplissage prudent (peut temporiser)',tags:'tamponnade péricarde triade beck péricardiocentèse'},
{id:'pno',cat:'Pathologies',sub:'Pathologies cardio-pulmonaires',titre:'Pneumothorax Compressif',emoji:'🏥',short:'Urgence vitale absolue. Exsufflation à l\'aiguille IMMÉDIATE puis drain.',body:'DÉFINITION\nPneumothorax avec mécanisme valve anti-retour → air entre à chaque inspiration, ne sort pas → augmentation pression pleurale → compression médiastinale → chute débit cardiaque.\n\nSIGNES CLINIQUES\n• Détresse respiratoire aiguë sévère\n• Hypotension + tachycardie (choc obstructif)\n• Turgescence jugulaire\n• Asymétrie d\'auscultation (silence d\'un côté)\n• Déviation trachéale controlatérale (tardif)\n\nCAUSES\n• Trauma thoracique\n• Ventilation mécanique (barotraumatisme) sous pressions élevées\n• Geste invasif (VVC sous-clavière, drain thoracique)\n\nURGENCE ABSOLUE\nEXSUFFLATION À L\'AIGUILLE IMMÉDIATE\n• 2ème espace intercostal, ligne médio-claviculaire\n• Aiguille 14–16G, bord supérieur de la 3ème côte\n• Bruit de fuite air = confirmation\nPuis drain thoracique (5ème EIC, triangle de sécurité)\n\nNE PAS attendre radio thorax si patient en détresse.',tags:'pneumothorax compressif exsufflation drain urgence'},
{id:'fv',cat:'Pathologies',sub:'Rythmes cardiaques',titre:'Fibrillation Ventriculaire (FV)',emoji:'🏥',short:'Rythme chaotique. Arrêt cardiaque. CEE 200J immédiat.',body:'DÉFINITION\nActivité électrique ventriculaire chaotique, non coordonnée → pas de contraction efficace → arrêt circulatoire.\n\nECG\nOscillations anarchiques, rapides, irrégulières. Pas de complexes QRS individualisables. Amplitude variable (FV à grandes mailles → petites mailles avec le temps).\n\nRYTHME CHOCABLE\n→ CEE 200 J biphasique immédiat (sans délai)\n→ MCE IMMÉDIATEMENT après le choc\n→ Vérification du rythme à 2 min\n→ Si FV persistante : CEE 200–360 J\n→ Après 3ème choc : Adrénaline 1 mg IVD + Amiodarone 300 mg IVD\n\nCAUSES\n• IDM transmural (cause n°1)\n• Cardiomyopathie sévère\n• QT long (médicamenteux, génétique)\n• Hypokaliémie, hypomagnésémie\n• Électrocution, noyade, hypothermie',tags:'fibrillation ventriculaire fv acr défibrillation cee'},
{id:'tv',cat:'Pathologies',sub:'Rythmes cardiaques',titre:'Tachycardie Ventriculaire (TV)',emoji:'🏥',short:'TV avec pouls bien tolérée : amiodarone. TV sans pouls / mal tolérée : CEE.',body:'DÉFINITION\nActivité ventriculaire rapide (> 100 bpm) et régulière d\'origine ventriculaire (dissociation auriculo-ventriculaire).\n\nECG\n• Complexes QRS larges (> 120 ms)\n• Réguliers, rapides (150–250 bpm)\n• Dissociation auriculo-ventriculaire (ondes P indépendantes)\n• Concordance (tous les QRS dans le même sens)\n\nFORMES ET TRAITEMENT\n• TV avec pouls bien tolérée (PA normale, pas de choc) :\n  → Amiodarone 150 mg IV en 10 min OU cardioversion électrique\n• TV avec pouls mal tolérée (choc, syncope, douleur) :\n  → CEE synchronisé 100–200 J après sédation\n• TV sans pouls :\n  → Protocole ACR (rythme chocable)\n\nPREMIER SIGNE DE FV : TV rapide peut dégénérer en FV.',tags:'tachycardie ventriculaire tv amiodarone cee arythmie'},
{id:'asystolie',cat:'Pathologies',sub:'Rythmes cardiaques',titre:'Asystolie',emoji:'🏥',short:'Rythme non chocable. Adrénaline toutes les 4 min. Causes 4H/4T.',body:'DÉFINITION\nAbsence d\'activité électrique ventriculaire → isoélectrique sur l\'ECG.\n\nECG : Ligne plate (vérifier amplitude ECG, électrodes bien posées)\n\nRYTHME NON CHOCABLE\n→ MCE continu\n→ Adrénaline 1 mg IVD dès 1er cycle, puis toutes les 2 cycles (4 min)\n→ PAS de CEE\n→ Rechercher et traiter causes reversibles (4H/4T)\n\n4H : Hypoxie, Hypovolémie, Hypo/Hyperkaliémie, Hypothermie\n4T : Thrombose (coronaire/EP), Tamponnade, Toxiques, Tension (PNO compressif)\n\nPRONOSTIC : Sombre (survie < 5% à la sortie si ACR > 10 min)',tags:'asystolie acr non chocable adrénaline'},
{id:'aesp',cat:'Pathologies',sub:'Rythmes cardiaques',titre:'AESP — Activité Électrique Sans Pouls',emoji:'🏥',short:'ECG organisé mais pas de pouls. Non chocable. Rechercher cause reversible.',body:'DÉFINITION\nPrésence d\'une activité électrique cardiaque organisée sur l\'ECG mais absence de débit cardiaque détectable.\n\nECG : Peut être normal, sinusal, régulier ou tachycarde — mais PAS DE POULS\n\nRYTHME NON CHOCABLE\n→ MCE continu\n→ Adrénaline 1 mg IVD puis /4 min\n→ Recherche urgente de cause reversible\n\nCAUSES REVERSIBLES (AESP++)\n• Tamponnade → péricardiocentèse\n• Pneumothorax compressif → exsufflation\n• Embolie pulmonaire → thrombolyse\n• Hypovolémie → remplissage massif\n• Hypoxie → oxygénation\n• Hyperkaliémie → gluconate calcium\n\nDIAGNOSTIC RAPIDE\nÉchographie cardiaque au cours de la RCP (fenêtres courtes) → distingue AESP vraie de fausse AESP',tags:'aesp activité électrique sans pouls acr tamponnade'},
{id:'oap',cat:'Pathologies',sub:'Pathologies cardio-pulmonaires',titre:'OAP — Œdème Aigu Pulmonaire',emoji:'🏥',short:'Inondation alvéolaire. Cardiogénique (HTA, IDM) ou lésionnel (SDRA).',body:'DÉFINITION\nAccumulation de liquide dans les alvéoles pulmonaires compromettant les échanges gazeux.\n\nOAP CARDIOGÉNIQUE (le plus fréquent)\nInsuffisance ventriculaire gauche → augmentation pression capillaire pulmonaire (Pcap > 25 mmHg) → transudation alvéolaire.\n\nOAP LÉSIONNEL (SDRA)\nLésion de la membrane alvéolo-capillaire → exsudat riche en protéines → alvéoles inondées.\n\nPRÉSENTATION\n• Dyspnée intense, orthopnée\n• Râles crépitants bilatéraux\n• Expectorations rosées, mousseuses\n• Désaturation rapide\n• Hypertension artérielle (OAP hypertensif)\n\nTRAITEMENT OAP CARDIOGÉNIQUE\n• Position semi-assise (jambes pendantes)\n• O2 haut débit → CPAP/VNI (1ère ligne)\n• Furosémide 40–80 mg IVD (diurèse rapide)\n• Dérivés nitrés (si PA > 110) : trinitrine sublinguale / IVSE\n• DANGER : remplissage vasculaire (aggrave la surcharge)\n\nHYPERTENSION ARTÉRIELLE\nOAP hypertensif : NAD CONTRE-INDIQUÉ. Nicardipine IVSE pour baisser la PA.',tags:'oap œdème pulmonaire vni furosémide cardiopathie'},
{id:'cad',cat:'Pathologies',sub:'Pathologies métaboliques',titre:'Cétoacidose Diabétique (CAD)',emoji:'🏥',short:'Insulinopénie + acidose cétonique. pH < 7.3. Insuline IVSE + hydratation.',body:'DÉFINITION\nTrio : Hyperglycémie (> 2.5 g/L) + Cétonémie (> 3 mmol/L) + Acidose (pH < 7.3, bicarbonates < 18 mmol/L).\n\nCAUSES\n• Diabète type 1 (manque insuline endogène)\n• Diabète type 2 décompensé (infection, IDM, stress)\n• Facteur déclenchant : infection ++, oubli insuline, alcool\n\nSIGNES\n• Polyurie-polydipsie, nausées, vomissements\n• Haleine acétonémique (odeur fruitée)\n• Douleurs abdominales\n• Polypnée (Kussmaul — compensation respiratoire)\n• Déshydratation globale\n\nBIOLOGIE\n• Glycémie > 2.5 g/L, corps cétoniques +++\n• pH < 7.3, bicarbonates < 18, trou anionique augmenté\n• HYPOKALIÉMIE fréquente (K+ sorti des cellules avec acidose)\n\nTRAITEMENT\n• Insuline IVSE : 0.1 UI/kg/h (50 UI/50 mL NaCl)\n• Hydratation : NaCl 0.9% 1L/h puis 0.5L/h\n• K+ si < 3.5 mmol/L → apporter avant insuline !\n• Pas de bicarbonates sauf pH < 7.0\n• Objectif glycémie : descente 0.5 g/L/h\n\nDANGER : Hypokaliémie sévère avec insuline (K+ rentre dans les cellules).',tags:'cétoacidose diabète hyperglycémie insuline acidose'},
{id:'meningite',cat:'Pathologies',sub:'Neurologie',titre:'Méningite Bactérienne',emoji:'🏥',short:'Purpura fulminans, céphalées, raideur nuque. Antibiotiques AVANT PL si instable.',body:'DÉFINITION\nInfection bactérienne des méninges et du LCR.\n\nBAKTÉRIES\n• Nourrisson : Listeria, S. agalactiae\n• Adulte jeune : N. meningitidis (méningocoque) — purpura fulminans\n• Adulte > 50 ans : S. pneumoniae ++ (pneumocoque), Listeria\n\nSIGNES CLINIQUES\n• Triade méningée : céphalées + fièvre + raideur de nuque\n• Photophobie, phonophobie\n• Purpura ecchymotique ou pétéchial (méningocoque — URGENCE)\n• Troubles de conscience, convulsions (formes graves)\n• Syndrome infectieux (fièvre, frissons)\n\nPRISE EN CHARGE\n1. ATB IMMÉDIATS (avant PL si troubles conscience ou instabilité) :\n   → Céfotaxime 4 g/6h IV OU Ceftriaxone 4 g/24h IV\n   → + Dexaméthasone 10 mg/6h × 4 jours\n   → + Amoxicilline 12 g/24h si suspicion Listeria (> 50 ans, gravide)\n2. PL si pas de CI (troubles coag, HTIC, coma)\n3. TDM cérébral si signes HTIC\n4. Réanimation : HTIC (PIC > 20), NAD si choc\n5. Déclaration obligatoire (méningocoque)\n\nURGENCE ABSOLUE : Délai ATB < 1 heure',tags:'méningite bactérienne antibiotiques céphalosporine HTIC'},
{id:'eclampsie',cat:'Pathologies',sub:'Gynéco-Obstétrique',titre:'Éclampsie / Pré-Éclampsie Sévère',emoji:'🏥',short:'HTA + protéinurie + convulsions post-partum. Mg SO4. Extraction fœtale.',body:'DÉFINITIONS\n• Pré-éclampsie : HTA (PAS ≥ 140 OU PAD ≥ 90) + protéinurie ≥ 0.3 g/24h après 20 SA\n• Pré-éclampsie sévère : PAS ≥ 160, PAD ≥ 110, ou atteinte viscérale (HELLP, IRA, éclampsie)\n• Éclampsie : survenue de convulsions (crises tonico-cloniques) dans le contexte de pré-éclampsie\n• HELLP syndrome : Hémolyse + Élévation Enzymes Hépatiques + Thrombopénie\n\nPRISE EN CHARGE\n• ANTIHYPERTENSEURS (objectif PAS < 150 mmHg) :\n  → Nicardipine IVSE (1ère ligne : 2–5 mg/h)\n  → Labétalol IV si non disponible\n• SULFATE DE MAGNÉSIE (prévention / traitement convulsions) :\n  → 4 g IV lent en 20 min puis 1–2 g/h IVSE\n• SURVEILLANCE MAGNESÉMIE : réflexes rotuliens (si abolis → intoxication)\n• EXTRACTION FŒTALE dès que possible si > 34 SA ou instabilité maternelle\n\nCONTRE-INDIQUÉS\n• AINS (rétention sodée, aggrave HTA, néphrotoxique)\n• Bêtabloquants (bradycardie fœtale)\n• IEC, ARA2 (tératogènes)',tags:'éclampsie pré-éclampsie hellp sulfate magnésie grossesse'},
{id:'intox_opia',cat:'Pathologies',sub:'Toxicologie',titre:'Intoxication aux Opiacés',emoji:'🏥',short:'Triade : myosis + bradypnée + coma. Naloxone 0.4 mg IVD.',body:'TOXIQUES : Héroïne, morphine, oxycodone, fentanyl, tramadol, codéine.\n\nTRIADE OPIACÉE\n• Myosis bilatéral (pupilles en tête d\'épingle)\n• Bradypnée (FR < 8/min)\n• Altération conscience (somnolence → coma)\n± Bradycardie, hypotension\n\nTRAITEMENT\n1. Position latérale de sécurité si conscient\n2. Oxygénation (MHC ou VNI si FR < 8)\n3. NALOXONE (antidote) :\n   → 0.4 mg IVD (renouvelable /2–3 min)\n   → Si patient dépendant : titration par 0.1 mg (évite syndrome sevrage brutal)\n   → Si longue demi-vie (fentanyl, méthadone) : IVSE 2/3 de la dose efficace/h\n4. Surveillance resédation (T1/2 naloxone 30–90 min)\n5. IOT si GCS ≤ 8 persistant\n\nCOMPLICATIONS\n• Pneumonie d\'inhalation\n• Rhabdomyolyse (si position vicieuse prolongée)\n• Syndrome de sevrage brutal (tachycardie, HTA, agitation)',tags:'opiacés intoxication héroïne morphine naloxone'},
{id:'intox_co',cat:'Pathologies',sub:'Toxicologie',titre:'Intoxication au Monoxyde de Carbone (CO)',emoji:'🏥',short:'HbCO. SpO2 FAUSSEMENT normale. O2 100% pur. Caisson hyperbare si grave.',body:'MÉCANISME\nCO se fixe sur l\'hémoglobine (affinité 250× > O₂) → HbCO → incapable de transporter l\'O₂ → hypoxie histotoxique.\n\nSPÉCIFICITÉ DIAGNOSTIQUE\nSpO₂ pulsée NORMALE car elle ne distingue pas HbO₂ de HbCO !\nDiagnostic : co-oxymétrie (SpCO ou sur GDS) → HbCO %\n\nSIGNES (selon HbCO%)\n• 10–20% : céphalées, vertiges, nausées\n• 20–40% : confusion, tachycardie, dyspnée\n• > 40–60% : coma, convulsions, ACR\n• Signe cutané classique : teint rosé (inconstant, non fiable)\n\nTRAITEMENT\n1. O₂ pur 100% (MHC ou IOT) : accélère élimination HbCO (T1/2 5h air → 90 min O₂ pur)\n2. CAISSON HYPERBARE si : HbCO > 25%, coma, convulsions, femme enceinte, cardiopathie\n3. Bilan : ECG (IDM, arythmie), ECG 12D, troponine, NFS\n4. Rhabdomyolyse ? Neurologie à distance (syndrome postintervallaire)',tags:'co monoxyde carbone intoxication caisson hyperbare spo2'},
/* ══════ SCORES ══════ */
{id:'sofa',cat:'Scores',sub:'Scores de réanimation',titre:'Score SOFA',emoji:'📊',short:'Sequential Organ Failure Assessment. 0–24 pts. Définit la dysfonction d\'organe.',body:'DÉFINITION\nScore évaluant la défaillance de 6 organes/systèmes. Utilisé pour définir le sepsis (dysfonction ≥ 2 points).\n\nCOMPOSANTES (0–4 points chacune)\n• Respiratoire : P/F ratio (400=0, <100=4)\n• Coagulation : Plaquettes G/L (>400=0, <20=4)\n• Foie : Bilirubine µmol/L (<20=0, >204=4)\n• Cardiovasculaire : PAM ou vasopresseurs\n• Neurologique : Score de Glasgow (15=0, <6=4)\n• Rénal : Créatinine µmol/L ou diurèse\n\nINTERPRÉTATION MORTALITÉ\n• Score < 6 : mortalité < 10%\n• Score 6–9 : mortalité 20–33%\n• Score 10–12 : mortalité 40–50%\n• Score 13–14 : mortalité 50–60%\n• Score > 14 : mortalité > 95%\n\nUTILISATION\n• Screening sepsis (SOFA ≥ 2 = dysfonction organe)\n• Monitoring évolution patient en réanimation\n• Stratification pronostique',tags:'sofa score défaillance organe sepsis réanimation'},
{id:'igs2',cat:'Scores',sub:'Scores de réanimation',titre:'IGS2 — Index de Gravité Simplifié',emoji:'📊',short:'Probabilité de décès à l\'admission en réanimation. Calculé dans les 24 premières heures.',body:'DÉFINITION\nScore calculé dans les 24 premières heures d\'admission en réanimation. Estimateur de la probabilité de mortalité hospitalière.\n\nCOMPOSANTES\n12 variables physiologiques : FC, PAS, T°, PaO₂/FiO₂, diurèse, urée, GB, K+, Na+, HCO₃-, bilirubine, GCS.\n+ Variables non physiologiques : âge, type d\'admission (médical urgent, chirurgical programmé ou urgent), comorbidités (cancer métastatique, hémopathie maligne, SIDA).\n\nINTERPRÉTATION\n• IGS2 < 20 : mortalité ≈ 5%\n• IGS2 30–40 : mortalité ≈ 20–30%\n• IGS2 > 60 : mortalité > 70%\n\nLIMITES\n• Calculé UNE FOIS à l\'admission (pas de réévaluation)\n• Probabilité de groupe, pas individuelle\n• N\'intègre pas les thérapeutiques',tags:'igs2 gravité mortalité pronostic réanimation'},
{id:'bps',cat:'Scores',sub:'Scores de surveillance',titre:'BPS — Behavioral Pain Scale',emoji:'📊',short:'Évaluation douleur patient non communiquant intubé. 3–12. Traiter si ≥ 5.',body:'UTILISATION\nPatient intubé sédaté, incapable de communiquer verbalement.\n\nCOMPOSANTES (chacune 1–4 pts)\n• Visage : détendu(1) → grimaçant(4)\n• Membres supérieurs : détendu(1) → fléchi(4)\n• Adaptation respiratoire au ventilateur : adapté(1) → lutte contre le ventilateur(4)\n\nINTERPRÉTATION\n• 3 : pas de douleur (minimum)\n• 4–5 : douleur légère\n• 6–7 : douleur modérée → analgésie insuffisante\n• ≥ 8 : douleur sévère → analgésie urgente\n\nCONDUITE À TENIR\nBPS ≥ 5 → Bolus sufentanil 5 µg IVD OU augmentation IVSE\nPriorité à l\'analgésie avant la sédation (approche analgesia-first)',tags:'bps douleur sédation analgésie patient intubé'},
{id:'ccmu',cat:'Scores',sub:'Scores de triage',titre:'CCMU — Classification Clinique des Malades aux Urgences',emoji:'📊',short:'Classification triage urgences. 1 (stable) à 5 (engagement vital).',body:'CLASSIFICATION\n• CCMU 1 : État stable, pas d\'acte diagnostique/thérapeutique nécessaire\n• CCMU 2 : État stable, acte diagnostique et/ou thérapeutique nécessaire\n• CCMU 3 : État pouvant s\'aggraver aux urgences, actes diagnostiques et thérapeutiques nécessaires. Pas d\'engagement vital à court terme\n• CCMU 4 : Pronostic vital engagé à court terme, actes thérapeutiques urgents\n• CCMU 5 : Pronostic vital immédiatement engagé, manœuvres de réanimation immédiates (ACR, détresse vitale)\n\nP : Patient décédé avant toute prise en charge\n\nUTILISATION\n• Régulation médicale SAMU\n• Triage aux urgences\n• Orientation vers la bonne structure (réanimation si CCMU 5)',tags:'ccmu triage urgences classification samu'},
/* ══════ ORGANISATION DES SOINS ══════ */
{id:'samu',cat:'Organisation',sub:'Urgences préhospitalières',titre:'SAMU — Service d\'Aide Médicale Urgente',emoji:'🏗',short:'Centre de régulation médicale. 15. Coordination des secours médicaux.',body:'DÉFINITION\nService hospitalier chargé de la régulation médicale des appels d\'urgence et de la coordination des soins préhospitaliers.\n\nMISSIONS\n• Répondre à toute demande d\'aide médicale urgente (15)\n• Évaluer le niveau d\'urgence par régulation médicale téléphonique\n• Engager les moyens de secours adaptés\n• Orienter le patient vers la structure hospitalière appropriée\n\nRÉGULATION MÉDICALE\nMédecin régulateur analyse : urgence vitale? Nécessite SMUR? Conseil médical suffisant? Transport infirmier?\n\nSMUR (Service Mobile d\'Urgence et de Réanimation)\n• Médecin urgentiste + infirmier\n• Matériel de réanimation complet\n• Gestes de réanimation préhospitalière\n• Paramédicalisation des patients avant transfert',tags:'samu smur régulation urgences préhospitalier 15'},
{id:'rea_unit',cat:'Organisation',sub:'Structures hospitalières',titre:'Réanimation — Unité de Soins Intensifs',emoji:'🏗',short:'Monitoring continu, 2 infirmières pour 6 patients, médecin 24h/24.',body:'DÉFINITION\nService spécialisé dans la prise en charge des patients présentant une ou plusieurs défaillances d\'organes engageant le pronostic vital.\n\nCRITÈRES D\'ADMISSION\n• Défaillance respiratoire (ventilation mécanique)\n• Défaillance circulatoire (vasopresseurs)\n• Défaillance neurologique sévère (GCS < 8)\n• Défaillance rénale sévère (épuration extra-rénale)\n• Surveillance intensive après chirurgie lourde\n\nORGANISATION\n• Ratio infirmier : 1 IDE pour 2–3 patients\n• Médecin présent 24h/24 (interne + senior)\n• Monitoring continu : scope, PA invasive, SpO₂, EtCO₂\n• Protocoles de soins standardisés\n\nDÉCHOCAGE\nSalle de déchocage : prise en charge immédiate des urgences vitales (SAUV — Salle d\'Accueil des Urgences Vitales).\nCapacité réduite, technicité maximale, débit élevé.',tags:'réanimation USC soins intensifs déchocage SAUV'},
{id:'score_sofa_card',cat:'Organisation',sub:'Structures hospitalières',titre:'USIC — Unité de Soins Intensifs Cardiologiques',emoji:'🏗',short:'Spécialisée cardiologie. SCA, arythmies, insuffisance cardiaque décompensée.',body:'SPÉCIALITÉ : Cardiologie interventionnelle + soins intensifs\n\nINDICATIONS\n• Syndrome coronarien aigu (SCA) : IDM, angor instable\n• Insuffisance cardiaque décompensée sévère\n• Arythmies graves (FA rapide, TV, BAV complet)\n• Post-angioplastie / stenting\n• Choc cardiogénique\n• Endocardite avec complications\n\nMONITORING\n• Scope ECG continu\n• PA non invasive continue\n• Saturation pulsée\n• Accès rapide à l\'échocardiographie\n• Accès à la coronarographie en urgence (< 90 min)\n\nDIFFÉRENCE AVEC RÉANIMATION\nPas de ventilation mécanique systématique (sauf exception). Pas d\'EER. Focus cardiologique.',tags:'usic cardiologie soins intensifs sca IDM'},
/* ══════ BIOLOGIE & EXAMENS ══════ */
{id:'gds',cat:'Biologie',sub:'Analyses biologiques',titre:'GDS Artériel — Gaz du Sang',emoji:'🔬',short:'pH, PaO2, PaCO2, HCO3-, BE, Lactate. Gold standard troubles acido-basiques.',body:'PARAMÈTRES MESURÉS\n• pH : 7.35–7.45 (< 7.35 = acidose, > 7.45 = alcalose)\n• PaO₂ : 80–100 mmHg (< 60 mmHg = hypoxémie sévère)\n• PaCO₂ : 35–45 mmHg (< 35 = hyperventilation, > 45 = hypoventilation)\n• HCO₃⁻ : 22–26 mmol/L\n• Excès de Base (BE) : -2 à +2 mmol/L\n• SaO₂ : 95–99%\n• Lactate : < 2 mmol/L\n\nINTERPRÉTATION SYSTÉMATIQUE\n1. Acidose (pH < 7.35) ou Alcalose (pH > 7.45) ?\n2. Si acidose : respiratoire (PaCO₂ ↑) ou métabolique (HCO₃⁻ ↓) ?\n3. Compensation adéquate ?\n4. Trou anionique = Na − (Cl + HCO₃) — normal 8–12 mmol/L\n   → TA augmenté : lactate, cétones, intoxication (méthanol, éthylène glycol)\n\nRATIO P/F\nPaO₂/FiO₂ → index d\'oxygénation → SDRA si < 300\n\nINDICATIONS\nTout patient en détresse respiratoire ou circulatoire, ventilé, ou trouble acido-basique suspecté.',tags:'gds sang artériel ph paco2 pao2 acidose alcalose'},
{id:'pct',cat:'Biologie',sub:'Analyses biologiques',titre:'Procalcitonine (PCT)',emoji:'🔬',short:'Marqueur d\'infection bactérienne. > 2 µg/L : probable. > 10 µg/L : sepsis sévère.',body:'DÉFINITION\nProhormone de la calcitonine. Produite par les cellules parathyroïdiennes et pulmonaires en réponse aux endotoxines bactériennes.\n\nVALEURS ET INTERPRÉTATION\n• < 0.5 µg/L : pas d\'infection bactérienne systémique\n• 0.5–2 µg/L : infection possible, contexte à prendre en compte\n• > 2 µg/L : infection bactérienne probable → ATB probablement indiqués\n• > 10 µg/L : sepsis sévère, choc septique probable\n• > 100 µg/L : choc septique grave\n\nAVANTAGES\n• Augmente rapidement (4–6h après infection)\n• Spécifique de l\'infection bactérienne (pas virale, sauf exception)\n• Utile pour guider ARRÊT des antibiotiques (si PCT < 0.5 ou baisse > 80% → arrêt possible)\n\nFAUX POSITIFS\n• Polytrauma récent, chirurgie\n• État de choc non infectieux\n• SDRA\n\nFAUX NÉGATIFS\n• Infection localisée (abcès, pneumopathie débutante)',tags:'procalcitonine pct sepsis infection antibiotique'},
{id:'troponine',cat:'Biologie',sub:'Analyses biologiques',titre:'Troponine hs — Haute Sensibilité',emoji:'🔬',short:'Marqueur nécrose myocardique. > 99e percentile = lésion myocardique. SCA ?',body:'DÉFINITION\nProtéine contractile cardiaque libérée lors de la nécrose myocardique.\n\nVALEURS\n• Normale < 99ème percentile (varie selon laboratoire, ex : < 14 ng/L pour TnI-hs)\n• Élévation significative : > 99ème percentile\n• Cinétique : montée en 1–3h, pic à 6–12h, normalisation à 48–72h\n\nINDICATIONS\n• Suspicion d\'IDM (douleur thoracique typique ou atypique)\n• ACR (toujours élevée)\n• Post-choc (toute cause)\n• EP grave\n• Myocardite\n\nINTERPRÉTATION\n• IDM STEMI : élévation franche et précoce (> 5× la normale)\n• IDM NSTEMI : élévation plus tardive, cinétique importante\n• Elévation sans cinétique : lésion myocardique chronique (insuffisance cardiaque, CKD, myocardite ancienne)\n\nDELTA TROPONINE (variation en 1h ou 3h) : critère diagnostique d\'IDM (si Δ > 5–6 ng/L en 1h)',tags:'troponine IDM sca infarctus myocarde biologie'},
{id:'ddimeres',cat:'Biologie',sub:'Analyses biologiques',titre:'D-Dimères',emoji:'🔬',short:'Produits de dégradation de la fibrine. Élevés dans EP, TVP, CIVD.',body:'DÉFINITION\nProduits de dégradation de la fibrine réticulée. Reflet de l\'activation de la coagulation ET de la fibrinolyse.\n\nSEUIL : > 500 ng/mL (µg/L) = positif (varie selon le test)\nAjusté à l\'âge : > (âge × 10) ng/mL chez > 50 ans\n\nINDICATIONS\n• Suspicion EP ou TVP (score de probabilité clinique faible/intermédiaire)\n• CIVD (coagulation intravasculaire disséminée)\n\nINTERPRÉTATION\nExcellente sensibilité (98%) mais faible spécificité.\nValeur NÉGATIVE : exclut EP avec forte probabilité (VPN 99%).\nValeur POSITIVE : non diagnostique — nécessite angio-TDM.\n\nCAUSES D\'ÉLÉVATION\n• EP / TVP\n• CIVD\n• Infection sévère, sepsis\n• Post-opératoire, trauma\n• Cancer\n• Grossesse\n• Âge (naturellement plus élevé)',tags:'d-dimères ep tvp fibrinolyse coagulation'},
{id:'nfs',cat:'Biologie',sub:'Analyses biologiques',titre:'NFS — Numération Formule Sanguine',emoji:'🔬',short:'Hémoglobine, Globules Blancs, Plaquettes. Anémie, infection, thrombopénie.',body:'PARAMÈTRES ET VALEURS NORMALES\n• Hémoglobine : Homme 13–17 g/dL, Femme 12–16 g/dL\n• Hématocrite : 40–54% (H), 37–47% (F)\n• VGM : 80–100 fL\n• Réticulocytes : 20–100 G/L\n• Globules Blancs (GB) : 4–10 G/L\n  → Polynucléaires neutrophiles (PNN) : 1.8–7.7 G/L\n  → Lymphocytes : 1–4 G/L\n  → Éosinophiles : 0.05–0.5 G/L\n• Plaquettes : 150–400 G/L\n\nINTERPRÉTATION RÉANIMATION\n• Hb < 7 → indication transfusion CGR\n• GB > 15 G/L → hyperleucocytose → infection, inflammation\n• GB < 4 G/L → leucopénie → immunodépression, sepsis\n• Plaquettes < 50 G/L → risque hémorragique, indication CPA si hémorragie\n• Plaquettes < 100 → thrombopénie modérée (sepsis, CIVD, iatrogène)\n\nSEPS ET NFS : L\'hyperleucocytose (PNN > 15) est peu spécifique. La déviation gauche (myélémie) oriente vers une infection bactérienne sévère.',tags:'nfs gb hémoglobine plaquettes leucocytes anémie'},
];

function renderPancarte(fp,dark,vw,sel,sSel,sVw,getAL,mut,aOn,au,pulse,sPulse,vol,sVol,sMut,sI,P,tk,eL,sP,sMod,addT,doAct,sAT,aT,shA,sShA,shTL,sShTL,helpLvl,setHelpLvl,adv,subTab,setSub,freeBeds,regulCalls,setRC,setSelCall,selCall,admitBed,setAdmitBed,admitFromCall,dischargePatient,trigE,DEC_EV,REA_EV,DRUGS,PROCS,VENTS,LABS){
        if(!fp||!fp.vitals||!fp.sap)return h('div',{style:{padding:20,textAlign:"center",color:"var(--fg3)"}},"Chargement...");
        const patDead=fp.isDead;
        return h('div',{style:{display:"flex",gap:4,height:"100%",opacity:patDead?0.65:1}},
        h('div',{style:{flex:1,overflow:"auto",minWidth:0,paddingRight:3}},
          // Bandeau DÉCÈS en pancarte
          patDead&&h('div',{style:{background:"linear-gradient(90deg,#1a1a1a,#111)",border:"2px solid #555",borderRadius:8,padding:"10px 16px",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}},
            h('div',null,
              h('div',{style:{fontSize:14,fontWeight:900,color:"#888",letterSpacing:2}},"⬛ DÉCÈS CONSTATÉ"),
              h('div',{style:{fontSize:11,color:"#555",marginTop:2}},"Heure : "+fp.deathTime+" — Toutes les constantes à zéro")),
            !fp.deathAlarmAcked&&h('button',{onClick:()=>sP(prev=>prev.map(q=>q.id===fp.id?{...q,deathAlarmAcked:true}:q)),style:{padding:"6px 14px",borderRadius:6,fontSize:11,fontWeight:700,background:"rgba(55,65,81,.9)",color:"#9ca3af",border:"1px solid #4b5563",cursor:"pointer"}},"🔕 Acquitter l'alarme"),
            fp.deathAlarmAcked&&h('div',{style:{fontSize:10,color:"#4b5563",fontWeight:600}},"🔕 Alarme acquittée")),
          // Header
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}},
            h('div',null,

function Timeline({history,w,ht}){if(!history||history.length<2)return h('div',{style:{fontSize:10,color:"var(--fg4)"}},"...");

  const mk=(pts,mn,mx)=>pts.map((v,i)=>`${i===0?"M":"L"}${(i*xs).toFixed(1)},${(ht-((v-mn)/(mx-mn))*(ht-10)-5).toFixed(1)}`).join(" ");
  return h('svg',{width:w,height:ht,style:{display:"block"}},h('rect',{width:w,height:ht,fill:"var(--scope)",rx:3}),
    h('path',{d:mk(pm,Math.min(30,...pm),Math.max(130,...pm)),fill:"none",stroke:"#f87171",strokeWidth:1.5}),
    h('path',{d:mk(sp,Math.min(60,...sp),Math.max(100,...sp)),fill:"none",stroke:"#22d3ee",strokeWidth:1.5}))}
